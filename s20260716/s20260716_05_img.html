<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .box{
            width: 100%;
            height: 300px;

        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-12 col-sm-4 mt-3">
                <div class="box bg-info text-center">
                    <img class="w-100 h-100 rounded" src="https://picsum.photos/id/30/400/300" alt="">
                </div>
            </div>
            <div class="col-12 col-sm-4 mt-3">
                <div class="box bg-info text-center">
                    <img class="w-100 h-100 rounded-circle" src="https://picsum.photos/id/31/400/300" alt="">
                </div>
            </div>
            <div class="col-12 col-sm-4 mt-3">
                <div class="box bg-info text-center">
                    <img class="w-100 h-100 img-thumbnail" src="https://picsum.photos/id/32/400/300" alt="">
                </div>
            </div>
        </div>
        
    </div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-12 col-sm-3 mt-3">
                <div class="box bg-info text-center">
                    <img class="w-100 h-100 rounded" src="https://picsum.photos/id/19/300/300" alt="">
                </div>
            </div>
            <div class="col-12 col-sm-3 mt-3">
                <div class="box bg-info text-center">
                    <img class="w-100 h-100 rounded" src="https://picsum.photos/id/20/300/300" alt="">
                </div>
            </div>
            <div class="col-12 col-sm-3 mt-3">
                <div class="box bg-info text-center">
                    <img class="w-100 h-100 rounded-circle" src="https://picsum.photos/id/21/300/300" alt="">
                </div>
            </div>
            <div class="col-12 col-sm-3 mt-3">
                <div class="box bg-info text-center">
                    <img class="w-100 h-100 img-thumbnail" src="https://picsum.photos/id/22/300/300" alt="">
                </div>
            </div>
        </div>
        
    </div>


</body>

</html>
