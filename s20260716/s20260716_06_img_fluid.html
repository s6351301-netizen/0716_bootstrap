<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container mt-3">
        <h2>Image</h2>
        <p>The .img-fluid class makes the image scale nicely to the parent element (resize the browser window to see the
            effect):</p>
        <!-- img-fluid -->
        <!-- css max-width: 100%; and height: auto; to the image: -->
        <img class="img-fluid" src="https://picsum.photos/id/30/1100/500" alt="New York" width="1100" height="500">
    </div>

</body>

</html>
