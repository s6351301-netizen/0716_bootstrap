<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禾米眼鏡 HOME OPTICAL</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            overflow:hidden;

            background:
            linear-gradient(
                135deg,
                #f7f4ef,
                #f0e5da,
                #e3d0c1
            );

            font-family:
            "Microsoft JhengHei",
            sans-serif;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        /* ====================== */
        /* 漂浮鏡片動畫 */
        /* ====================== */

        .lens{
            position:absolute;
            border-radius:50%;

            backdrop-filter:blur(8px);

            background:
            rgba(255,255,255,.08);

            border:
            2px solid rgba(255,255,255,.4);

            box-shadow:
            inset 0 0 30px rgba(255,255,255,.7),
            0 0 40px rgba(255,255,255,.3);

            animation:
            float 14s ease-in-out infinite;
        }

        .lens::before{
            content:"";

            position:absolute;
            width:100%;
            height:100%;
            border-radius:50%;

            background:
            linear-gradient(
                135deg,
                transparent,
                rgba(173,216,230,.25),
                rgba(255,255,255,.4),
                transparent
            );
        }

        .lens1{
            width:320px;
            height:320px;
            left:-80px;
            top:50px;
        }

        .lens2{
            width:250px;
            height:250px;
            right:-60px;
            top:80px;
        }

        .lens3{
            width:400px;
            height:400px;
            bottom:-150px;
            left:45%;
        }

        @keyframes float{

            0%{
                transform:
                translateY(0px)
                rotate(0deg);
            }

            50%{
                transform:
                translateY(-35px)
                rotate(10deg);
            }

            100%{
                transform:
                translateY(0px)
                rotate(0deg);
            }
        }

        /* ====================== */
        /* 登入卡片 */
        /* ====================== */

        .login-card{

            width:100%;
            max-width:500px;

            background:
            rgba(255,255,255,.85);

            backdrop-filter:blur(20px);

            border-radius:30px;

            padding:40px;

            box-shadow:
            0 25px 50px rgba(0,0,0,.12);

            border-top:
            10px solid #B5523C;

            z-index:10;
        }

        .logo-box{

            width:100px;
            height:100px;

            margin:auto;

            border-radius:50%;

            background:#B5523C;

            color:white;

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:42px;
        }

        .brand-title{

            color:#8A3B2A;

            font-weight:bold;

            margin-top:15px;
        }

        .brand-sub{

            color:#888;
            letter-spacing:2px;
        }

        .welcome{

            color:#666;
            font-size:14px;
            line-height:1.8;
        }

        .form-control{

            border-radius:15px;
            padding:14px;
            border:1px solid #ddd;
        }

        .form-control:focus{

            border-color:#B5523C;

            box-shadow:
            0 0 0 .2rem rgba(181,82,60,.15);
        }

        .btn-login{

            background:#B5523C;
            border:none;

            border-radius:15px;

            padding:14px;

            font-size:18px;
            font-weight:bold;
        }

        .btn-login:hover{

            background:#9a4431;
        }

        .register-box{

            border-top:1px solid #ddd;
            margin-top:25px;
            padding-top:20px;
        }

        .register-link{

            text-decoration:none;
            color:#B5523C;
            font-weight:bold;
        }

        .register-link:hover{

            color:#8A3B2A;
        }

        .footer{

            font-size:12px;
            color:#999;
        }

        .forgot-link{

            text-decoration:none;
            color:#B5523C;
        }

        .forgot-link:hover{

            color:#8A3B2A;
        }

        .password-box{

            position:relative;
        }

        .toggle-password{

            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            color:#888;
        }

        @media(max-width:576px){

            .login-card{
                margin:20px;
                padding:30px;
            }
        }

    </style>
</head>

<body>

    <!-- 漂浮鏡片 -->
    <div class="lens lens1"></div>
    <div class="lens lens2"></div>
    <div class="lens lens3"></div>

    <!-- 登入卡片 -->
    <div class="login-card">

        <div class="text-center">

            <div class="logo-box">
                👓
            </div>

            <h2 class="brand-title">
                禾米眼鏡
            </h2>

            <div class="brand-sub">
                HOME OPTICAL
            </div>

            <p class="welcome mt-3">
                專業驗光 × 精準配鏡 × 視覺顧問<br>
                Professional Optometry & Vision Care
            </p>

        </div>

        <form method="post" action="login.php">

            <div class="mb-3">

                <label class="fw-bold">
                    帳號 Account
                </label>

                <input
                    type="text"
                    class="form-control"
                    placeholder="請輸入帳號 Enter Account"
                    name="account">

            </div>

            <div class="mb-3">

                <label class="fw-bold">
                    密碼 Password
                </label>

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="請輸入密碼 Enter Password"
                        name="password">

                    <i
                        class="bi bi-eye toggle-password"
                        onclick="togglePassword()"></i>

                </div>

            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div class="form-check">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        id="remember">

                    <label
                        class="form-check-label"
                        for="remember">

                        記住密碼 Remember Me

                    </label>

                </div>

                <a href="#" class="forgot-link">

                    忘記密碼？
                    <br>
                    Forgot Password

                </a>

            </div>

            <button
                class="btn btn-login text-white w-100">

                登入 Login

            </button>

        </form>

        <div class="register-box text-center">

            <p class="mb-2">

                還不是會員？
                <br>
                Not a Member Yet?

            </p>

            <a
                href="register.php"
                class="register-link">

                立即註冊 Register Now

            </a>

        </div>

        <div class="text-center mt-4 footer">

            © 2026 禾米眼鏡 HEMI OPTICAL<br>
            Professional Optometry & Eyewear

        </div>

    </div>

<script>

function togglePassword(){

    const pwd =
    document.getElementById('password');

    if(pwd.type === "password"){

        pwd.type = "text";

    }else{

        pwd.type = "password";
    }
}

</script>

</body>
</html>
