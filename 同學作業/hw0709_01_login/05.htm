<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap 全元件整合登入範例 (純視覺無功能版)</title>
  <!-- 引入 Bootstrap 5.3 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 修正後的 Bootstrap Icons 網址 -->
  <link href="https://jsdelivr.net" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
  </style>
</head>
<body>

  <!-- 元件 1: 導覽列 (Navbar) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><i class="bi bi-shield-lock-fill me-2"></i>安全認證中心</a>
      <button class="navbar-toggler" type="button">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse show" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="#">首頁</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">說明幫助</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- 元件 2: 麵包屑導覽 (Breadcrumb) -->
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">首頁</a></li>
        <li class="breadcrumb-item active" aria-current="page">會員登入</li>
      </ol>
    </nav>

    <!-- 元件 3: 警告框 (Alert) -->
    <div class="alert alert-info" role="alert">
      <strong>提示：</strong> 本系統已全面升級，若有任何登入問題請點擊右上角「說明幫助」。
    </div>

    <div class="row justify-content-center mt-5">
      <div class="col-md-6 col-lg-5">
        
        <!-- 元件 4: 卡片 (Card) -->
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-0">帳號登入</h4>
          </div>
          <div class="card-body p-4">
            
            <form>
              <!-- 元件 5: 浮動標籤輸入框 (Floating Labels - Email) -->
              <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                <label for="floatingInput"><i class="bi bi-envelope me-2"></i>電子郵件地址</label>
              </div>

              <!-- 元件 6: 浮動標籤輸入框 (Floating Labels - Password) -->
              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                <label for="floatingPassword"><i class="bi bi-key me-2"></i>密碼</label>
              </div>

              <!-- 元件 7: 輸入群組與核取方塊 (Checks & Radios) -->
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="flexCheckDefault">
                <label class="form-check-label" id="remember-me" for="flexCheckDefault">
                  記住我的登入資訊
                </label>
              </div>

              <!-- 元件 8: 按鈕 (Buttons) -->
              <button class="btn btn-primary w-100 py-2 mb-3" type="button">
                <i class="bi bi-box-arrow-in-right me-2"></i>立即登入
              </button>

              <!-- 元件 9: 分隔線與徽章 (Badges) -->
              <div class="position-relative d-flex align-items-center justify-content-center my-4">
                <hr class="w-100 text-secondary">
                <span class="position-absolute bg-white px-3 text-secondary text-uppercase fs-7">或者使用</span>
              </div>

              <!-- 元件 10: 按鈕群組 (Button Group) 用於第三方登入 -->
              <div class="d-flex justify-content-center">
                <div class="btn-group w-100" role="group" aria-label="Third-party login">
                  <button type="button" class="btn btn-outline-danger"><i class="bi bi-google me-2"></i>Google</button>
                  <button type="button" class="btn btn-outline-primary"><i class="bi bi-facebook me-2"></i>Facebook</button>
                </div>
              </div>

            </form>
          </div>
          <div class="card-footer text-center py-3 bg-light">
            <a href="#" class="text-decoration-none fs-7 me-3">忘記密碼？</a>
            <a href="#" class="text-decoration-none fs-7">註冊新帳號</a>
          </div>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
