<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Document</title>
</head>
<style>
    /* 打造完美的薰衣草紫登入按鈕 */
    .btn-login-sync {
        background-color: transparent !important;
        /* 平常透明，露出你的深紫背景 */
        border: 2px solid #E1BEE7 !important;
        /* 邊框使用同款薰衣草紫 */
        color: #E1BEE7 !important;
        /* 文字使用同款薰衣草紫 */
        transition: all 0.2s ease-in-out;
    }

    /* 滑鼠懸停（Hover）時：按鈕填滿粉紫，文字變成深紫，做出高對比亮眼效果 */
    .btn-login-sync:hover {
        background-color: #E1BEE7 !important;
        /* 變成滿版粉紫 */
        color: #4A148C !important;
        /* 文字變深紫色，看得超清楚 */
        border-color: #E1BEE7 !important;
    }

    /* 點擊（Active）或聚焦（Focus）時的效果 */
    .btn-login-sync:active,
    .btn-login-sync:focus {
        background-color: #CBD5E1 !important;
        /* 點擊時輕微轉淡灰紫 */
        box-shadow: 0 0 0 0.25rem rgba(225, 190, 231, 0.5) !important;
        /* 紫色發光外圈 */
    }
</style>

<body>
    <div class="container py-4" style="max-width: 400px;">
        <form>
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label fw-bold fs-5" style="color: #E1BEE7;">帳號</label>
                <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                <div id="emailHelp" class="form-text fw-medium" style="color: #E1BEE7; opacity: 0.85;">請輸入郵件</div>
            </div>

            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label fw-bold fs-5" style="color: #E1BEE7;">密碼</label>
                <input type="password" class="form-control" id="exampleInputPassword1">
            </div>

            <div class="mb-3 form-check d-flex align-items-center">
                <input type="checkbox" class="form-check-input me-2" id="exampleCheck1">
                <label class="form-check-label fw-bold fs-5" for="exampleCheck1" style="color: #E1BEE7;">
                    點我記住帳密
                </label>
            </div>

            <button type="submit" class="btn btn-login-sync w-30 fw-bold fs-8">
                登入
            </button>
        </form>
    </div>
</body>

</html>
