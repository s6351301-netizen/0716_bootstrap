<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap表單範例</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 60px 20px;
        }

        .outer-container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: white;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>

    <div class="outer-container">
        <div class="container">

            <h1>表單範例</h1>

            <form action="/action_page.php">
                <div class="form-check form-switch text-start text-white">
                    <input class="form-check-input" type="checkbox" id="mySwitch" name="darkmode" value="yes" checked>
                    <label class="form-check-label" for="mySwitch">切換</label>
                </div>
                <div>
                    <label for="customRange" class="form-label text-white">選取範圍</label>
                    <input type="range" class="form-range" id="customRange" step="25" min="0" max="100">
                </div>
                <div class="mb-3 mt-3 text-start text-white">
                    <label for="email" class="form-label">帳號：</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
                </div>
                <div class="mb-3 text-start text-white">
                    <label for="pwd" class="form-label">密碼：</label>
                    <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd">
                </div>
                <div class="form-check mt-4 text-start text-white">
                    <label class="form-check-label">
                        <input class="form-check-input" type="checkbox" name="remember">記住密碼
                    </label>
                </div>
                <div class="mt-4 text-start text-white">
                    <label for="">性別：</label>
                    <select class="form-select mt-3">
                        <option>男</option>
                        <option>女</option>
                    </select>
                </div>
                <div class="mb-3 mt-5 text-start text-white">
                    <label for="comment text-start text-white">關於我的：</label>
                    <textarea class="form-control mt-3" rows="6" id="comment" name="text"></textarea>
                </div>
                <button type="clear" class="btn btn-primary">重置</button>
                <button type="submit" class="btn btn-primary">提交</button>
            </form>
        </div>

</body>

</html>
