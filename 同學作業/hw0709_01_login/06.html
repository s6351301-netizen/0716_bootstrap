<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <title>顧客滿意度回饋表 - Bootstrap 範例</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

    <div class="container mt-5 mb-5">
        <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5 bg-white mx-auto" style="max-width: 800px;">
            <h2 class="text-center fw-bold mb-4" style="color: #556B2F;">顧客滿意度回饋表</h2>
            <p class="text-center text-muted mb-4">感謝您光臨 L'Ulivo Trattoria！請填寫以下問卷，幫助我們提供更好的服務。</p>
            
            <form>
                <!-- Row 1: 姓名與用餐日期 (Text & Date) -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label for="customerName" class="form-label text-muted small fw-bold">姓名 (選填)</label>
                        <input type="text" class="form-control form-control-lg bg-light border-0" id="customerName" placeholder="王小明">
                    </div>
                    <div class="col-md-6">
                        <label for="dineDate" class="form-label text-muted small fw-bold">用餐日期 <span class="text-danger">*</span></label>
                        <input type="date" class="form-control form-control-lg bg-light border-0" id="dineDate" required>
                    </div>
                </div>

                <!-- Row 2: 滿意度評分 (Select) -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label for="foodRating" class="form-label text-muted small fw-bold">餐點滿意度</label>
                        <select class="form-select form-select-lg bg-light border-0" id="foodRating">
                            <option value="5" selected>⭐⭐⭐⭐⭐ 非常滿意</option>
                            <option value="4">⭐⭐⭐⭐ 滿意</option>
                            <option value="3">⭐⭐⭐ 普通</option>
                            <option value="2">⭐⭐ 不滿意</option>
                            <option value="1">⭐ 非常不滿意</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="serviceRating" class="form-label text-muted small fw-bold">服務滿意度</label>
                        <select class="form-select form-select-lg bg-light border-0" id="serviceRating">
                            <option value="5" selected>⭐⭐⭐⭐⭐ 非常滿意</option>
                            <option value="4">⭐⭐⭐⭐ 滿意</option>
                            <option value="3">⭐⭐⭐ 普通</option>
                            <option value="2">⭐⭐ 不滿意</option>
                            <option value="1">⭐ 非常不滿意</option>
                        </select>
                    </div>
                </div>

                <!-- Row 3: 喜歡的菜色 (Checkbox) & 用餐目的 (Radio) -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">今天最喜歡的菜色 (可複選)</label>
                        <div class="form-check mb-2">
                            <input type="checkbox" class="form-check-input" id="dish1" name="favoriteDish" value="pasta" checked>
                            <label class="form-check-label" for="dish1">蒜香橄欖油義大利麵</label>
                        </div>
                        <div class="form-check mb-2">
                            <input type="checkbox" class="form-check-input" id="dish2" name="favoriteDish" value="pizza">
                            <label class="form-check-label" for="dish2">瑪格麗特披薩</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="dish3" name="favoriteDish" value="tiramisu">
                            <label class="form-check-label" for="dish3">經典提拉米蘇</label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">本次用餐目的 (單選)</label>
                        <div class="form-check mb-2">
                            <input type="radio" class="form-check-input" id="purpose1" name="dinePurpose" value="family" checked>
                            <label class="form-check-label" for="purpose1">家庭聚餐</label>
                        </div>
                        <div class="form-check mb-2">
                            <input type="radio" class="form-check-input" id="purpose2" name="dinePurpose" value="friends">
                            <label class="form-check-label" for="purpose2">朋友聚會</label>
                        </div>
                        <div class="form-check mb-2">
                            <input type="radio" class="form-check-input" id="purpose3" name="dinePurpose" value="date">
                            <label class="form-check-label" for="purpose3">約會</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" class="form-check-input" id="purpose4" name="dinePurpose" value="other">
                            <label class="form-check-label" for="purpose4">其他</label>
                        </div>
                    </div>
                </div>

                <!-- Row 4: 具體建議 (Textarea) -->
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <label for="feedbackComment" class="form-label text-muted small fw-bold">具體建議或想對我們說的話</label>
                        <textarea class="form-control form-control-lg bg-light border-0" rows="4" id="feedbackComment" placeholder="例如：義大利麵非常道地，但希望能增加更多素食選擇..."></textarea>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="row g-3">
                    <div class="col-6">
                        <button type="reset" class="btn btn-outline-secondary w-100 fw-bold py-3 rounded-3">重新填寫</button>
                    </div>
                    <div class="col-6">
                        <button type="button" class="btn text-white w-100 fw-bold py-3 rounded-3" style="background-color: #E2725B;" onclick="alert('感謝您的回饋！')">送出回饋</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
