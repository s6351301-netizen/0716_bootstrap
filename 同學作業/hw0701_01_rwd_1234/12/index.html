<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .box {
            height: 25vh;
            background-color: lightblue;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .box img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col">
                <div class="box"><img src="./img/02.jpg" class="img-fluid" alt="11"></div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-sm-6">
                <div class="box"><img src="./img/03.jpg" class="img-fluid" alt="21"></div>
            </div>
            <div class="col-12 col-sm-6">
                <div class="box"><img src="./img/04.jpg" class="img-fluid" alt="22"></div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-sm-4">
                <div class="box"><img src="./img/05.jpg" class="img-fluid" alt="31"></div>
            </div>
            <div class="col-12 col-sm-4">
                <div class="box"><img src="./img/06.jpg" class="img-fluid" alt="32"></div>
            </div>
            <div class="col-12 col-sm-4">
                <div class="box"><img src="./img/06.jpg" class="img-fluid" alt="33"></div>
            </div>
        </div>

        <div class="row">
            <div class="col-6 col-sm-3">
                <div class="box"><img src="./img/07.jpg" class="img-fluid" alt="41"></div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box"><img src="./img/08.jpg" class="img-fluid" alt="42"></div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box"><img src="./img/09.jpg" class="img-fluid" alt="43"></div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box"><img src="./img/10.jpg" class="img-fluid" alt="44"></div>
            </div>
        </div>

        <div class="row">
            <div class="col-6 col-sm-4">
                <div class="box"><img src="./img/11.jpg" class="img-fluid" alt="51"></div>
            </div>
            <div class="col-6 col-sm-8">
                <div class="box"><img src="./img/12.jpg" class="img-fluid" alt="52"></div>
            </div>
        </div>
    </div>

</body>
</html>
