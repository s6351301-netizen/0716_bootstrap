<!DOCTYPE html>
<html lang="en">

<head>
     <title>Bootstrap Example</title>
     <meta charset="utf-8">
     <meta name="viewport" content="width=device-width, initial-scale=1">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
     <style>
          .box {
               /* width: 100%; */
               height: 25vh
               background-color: lightblue;
               border-radius: 10px;
               font-style: italic;
               font-weight: bold;
               border-bottom: 2px solid black;
               text-shadow: 1px 1px 2px white;
               color: white;
               font-size: 24px;
          }

          .box11 {
               background-color: lightcoral;
               text-align: center;
          }

          .box21 {
               background-color: lightseagreen;
               opacity: 0.2;
               text-align: center;
          }

          .box22 {
               background-color: lightseagreen;
               opacity: 1;
               text-align: center;
          }
          .box31 {
               background-color: lightpink;
               opacity: 0.2;
               text-align: center;
          }
          .box32 {
               background-color: lightpink;
               opacity: 0.6;
               text-align: center;
          }
          .box33 {
               background-color: lightpink;
               opacity: 1;
               text-align: center;
          }
          .box41 {
               background-color: lightyellow;
               opacity: 0.2;
               text-align: center;
          }
          .box42 {
               background-color: lightyellow;
               opacity: 0.5;
               text-align: center;
          }
          .box43 {
               background-color: lightyellow;
               opacity: 0.8;
               text-align: center;
          }
          .box44 {
               background-color: lightyellow;
               opacity: 1;
               text-align: center;
          }
          .box51 {
               background-color: purple;
                opacity: 0.2;
                text-align: center;
          }
          .box52 {
               background-color: purple;
               opacity: 0.4;
               text-align: center;
          }
          .box53{
               background-color: purple;
               opacity: 0.6;
               text-align: center;
          }
          .box54{
               background-color: purple;
               opacity: 0.8;
                text-align: center;
          }
          .box55 {
               background-color: purple;
               opacity: 1;
               text-align: center;
          }


     </style>
</head>

<body>
     <!-- container row col -->
     <div class="container">
          <div class="row">
               <div class="col">
                    <div class="box box11">
                         11
                    </div>
               </div>
          </div>
          <div class="row">
               <div class="col-12 col-sm-6">
                    <div class="box box21">
                         21
                    </div>
               </div>
               <div class="col-12 col-sm-6">
                    <div class="box box22">
                         22
                    </div>
               </div>
          </div>
          <div class="row">
               <div class="col-12 col-sm-4">
                <div class=" box box31">
                    31
               </div>
          </div>
          <div class="col-12 col-sm-4">
               <div class="box box32">
                    32
               </div>
          </div>
          <div class="col-12 col-sm-4">
               <div class="box box33">
                    33
               </div>
          </div>
     </div>
     <div class="row">
          <div class="col-12 col-sm-3">
               <div class="box box41">
                    41
               </div>
          </div>
          <div class="col-6 col-sm-3">
               <div class="box box42">
                    42
               </div>
          </div>
          <div class="col-6 col-sm-3">
               <div class="box box43">
                    43
               </div>
          </div>
          <div class="col-6 col-sm-3">
               <div class="box box44">
                    44
               </div>
          </div>
     </div>

     <div class="row">
          <div class="col col-sm-2.4">
               <div class="box box51">
                    51
               </div>
          </div>
           <div class="col col-sm-2.4">
               <div class="box box52">
                    52
               </div>
          </div>
           <div class="col col-sm-2.4">
               <div class="box box52">
                    53
               </div>
          </div>
            <div class="col col-sm-2.4">
               <div class="box box52">
                    54
               </div>
          </div>
            <div class="col col-sm-2.4">
               <div class="box box52">
                    55
               </div>
          </div>
     </div>
     </div>


</body>

</html>
