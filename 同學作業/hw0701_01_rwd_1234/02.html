<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .box {
            /* width: 100%; */
            height: 25vh;
            background-color: lightblue;
            margin-top: 20px;
        }

        .box11 {
            background-color: lightcoral;
        }

        .box21 {
            background-color: lightseagreen;
        }

        .box22 {
            background-color: aquamarine;
        }
        .box31 {
            background-color: lightpink;
        }

        .box32 {
            background-color: lightyellow;
        }
        .box33 {
            background-color: lemonchiffon;
        }
        .box44 {
            background-color: aquamarine;
        }
        .box41 {
            background-color: lightpink;
        }

        .box42 {
            background-color: lightyellow;
        }
        .box43 {
            background-color: lemonchiffon;
        }
        .box51 {
            background-color: lightpink;
        }

        .box52 {
            background-color: rgb(132, 53, 161);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col2 box box11">11</div>
        </div>
      
        <div class="row">
            <div class="col-12 col-md-6 box box21">21</div>
            <div class="col-12 col-md-6 box box22">22</div>
        </div>
        <div class="row">
            <div class="col-12 col-md-4 box box31">31</div>
            <div class="col-12 col-md-4 box box32">32</div>
            <div class="col-12 col-md-4 box box33">33</div>
        </div>
        <div class="row">
            <!-- screen size ++   bobnumber ++ 3種size -->
            <div class="col-12 col-sm-6 col-md-3 box box41">41</div>
            <div class="col-12 col-sm-6 col-md-3 box box42">42</div>
            <div class="col-12 col-sm-6 col-md-3 box box43">43</div>
            <div class="col-12 col-sm-6 col-md-3 box box44">44</div>
        </div>
        <div class="row">
            <div class="col-12 col-md-4 box box51">51</div>
            <div class="col-12 col-md-8 box box52">52</div>            
        </div>
    </div></body></html>
