<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        
        .box {
            height: 25vh;
            margin-top: 20px;
            
            background-size: cover;
            background-position: center;
            
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            padding: 10px;
        }

        .box11 { background-image: url('https://picsum.photos/600/600?random=11'); }
        
        .box21 { background-image: url('https://picsum.photos/600/600?random=21'); }
        .box22 { background-image: url('https://picsum.photos/600/600?random=22'); }
        
        .box31 { background-image: url('https://picsum.photos/600/600?random=31'); }
        .box32 { background-image: url('https://picsum.photos/600/600?random=32'); }
        .box33 { background-image: url('https://picsum.photos/600/600?random=33'); }
        
        .box41 { background-image: url('https://picsum.photos/600/600?random=41'); }
        .box42 { background-image: url('https://picsum.photos/600/600?random=42'); }
        .box43 { background-image: url('https://picsum.photos/600/600?random=43'); }
        .box44 { background-image: url('https://picsum.photos/600/600?random=44'); }
        
        .box51 { background-image: url('https://picsum.photos/600/600?random=51'); }
        .box52 { background-image: url('https://picsum.photos/600/600?random=52'); }
    </style>
</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col">
                <div class="box box11">11</div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-12 col-sm-6">
                <div class="box box21">21</div>
            </div>
            <div class="col-12 col-sm-6">
                <div class="box box22">22</div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-12 col-sm-4">
                <div class="box box31">31</div>
            </div>
            <div class="col-12 col-sm-4">
                <div class="box box32">32</div>
            </div>
            <div class="col-12 col-sm-4">
                <div class="box box33">33</div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-6 col-sm-3">
                <div class="box box41">41</div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box box42">42</div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box box43">43</div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box box44">44</div>
            </div>
        </div>

        <div class="row">
            <div class="col-6 col-sm-4">
                <div class="box box51">51</div>
            </div>
            <div class="col-6 col-sm-8">
                <div class="box box52">52</div>
            </div>
        </div>
    </div>

</body>
</html>
