<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Document</title>
</head>
<style>
    
    .row{
        border-radius: 35px 35px 30px 30px;
    }
    .col-md-4{
    background-color: rgb(124, 131, 219);
    border-radius: 35px 35px 30px 30px;
    box-shadow: 5px 3px 3px;
  }
  .col-md-6{
    background-color: aqua;
    border-radius: 35px 35px 30px 30px;
    box-shadow: 5px 3px 3px;
  }

  .col-md-3{
    background-color: rgb(247, 0, 255);
    border-radius: 35px 35px 30px 30px;
    box-shadow: 5px 3px 3px;
  }
  .col{
    background-color: chocolate;
    border-radius: 35px 35px 30px 30px;
    box-shadow: 5px 3px 3px;
  }
</style>
<body>
    <div class="container text-center">
        <div class="row">
            <div class="col">1</div>
        </div>
    <div class="row">
        <div class="col-12 col-md-6">2</div>
        <div class="col-12 col-md-6">3</div>
    </div>
    <div class="row">
        <div class="col-12 col-md-4">4</div>
        <div class="col-12 col-md-4">5</div>
        <div class="col-12 col-md-4">6</div>
    </div>
    <div class="row">
        <div class="col-6 col-md-3">7</div>
        <div class="col-6 col-md-3">8</div>
        <div class="col-6 col-md-3">9</div>
        <div class="col-6 col-md-3">10</div>
    </div>
</div>
</body>
</html>
