<!DOCTYPE html>
<html lang="en">

<head>
    <title>甜點與動漫少女的午茶時光</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        /* 網頁第一行大標題的自訂樣式 */
        .page-title {
            color: #ff758f;
            /* 浪漫的草莓粉色 */
            font-weight: bold;
            /* 字體加粗 */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            /* 字體微弱陰影 */
        }

        .box {
            height: 25vh;
            background-color: lightblue;
            margin-top: 20px;
            overflow: hidden;
            /* 防止圖片超出格子的邊框 */
            border-radius: 12px;
            /* 柔和的卡片圓角 */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            /* 微弱的立體陰影 */
        }

        /* 讓圖片完美滿版且不變形 */
        .box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 柔和馬卡龍色系底色 */
        .box11 {
            background-color: #ffb5a7;
        }

        .box21 {
            background-color: #fcd5ce;
        }

        .box22 {
            background-color: #f8ad9d;
        }

        .box31 {
            background-color: #f4978e;
        }

        .box32 {
            background-color: #fbc4ab;
        }

        .box33 {
            background-color: #ffdac1;
        }

        .box41 {
            background-color: #e2ece9;
        }

        .box42 {
            background-color: #dfe7fd;
        }

        .box43 {
            background-color: #c5dedd;
        }

        .box44 {
            background-color: #d6e2e9;
        }

        .box51 {
            background-color: #f0efa6;
        }

        .box52 {
            background-color: #ccd5ae;
        }
    </style>
</head>

<body>

    <div class="container my-5">

        <div class="row text-center mb-4">
            <div class="col">
                <h1 class="page-title display-5">甜點與動漫少女的午茶時光</h1>
                <p class="text-muted">~ Welcome to Anime Dessert Time ~</p>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="box box11">
                    <img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=600&auto=format&fit=crop"
                        alt="Anime Girl Main">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-sm-6">
                <div class="box box21">
                    <img src="https://images.unsplash.com/photo-1511018556340-d16986a1c194?w=500&auto=format&fit=crop"
                        alt="Cartoon Strawberry Cake">
                </div>
            </div>
            <div class="col-12 col-sm-6">
                <div class="box box22">
                    <img src="https://images.unsplash.com/photo-1618336753974-aae8e04506aa?w=400&auto=format&fit=crop"
                        alt="Cartoon Cookies">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 col-sm-4">
                <div class="box box31">
                    <img src="https://images.unsplash.com/photo-1587314168485-3236d6710814?w=400&auto=format&fit=crop"
                        alt="Macarons">
                </div>
            </div>
            <div class="col-12 col-sm-4">
                <div class="box box32">
                    <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?w=400&auto=format&fit=crop"
                        alt="Donuts">
                </div>
            </div>
            <div class="col-12 col-sm-4">
                <div class="box box33">
                    <img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=400&auto=format&fit=crop"
                        alt="Cupcake">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-6 col-sm-3">
                <div class="box box41">
                    <img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?w=400&auto=format&fit=crop"
                        alt="Anime Girl 2">
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box box42">
                    <img src="https://images.unsplash.com/photo-1580477667995-2b94f01c9516?w=400&auto=format&fit=crop"
                        alt="Anime Girl 3">
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box box43">
                    <img src="https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?w=400&auto=format&fit=crop"
                        alt="Anime Girl 4">
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box box44">
                    <img src="https://images.unsplash.com/photo-1618336753974-aae8e04506aa?w=400&auto=format&fit=crop"
                        alt="Anime Girl 5">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-6 col-sm-4">
                <div class="box box51">
                    <img src="https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=400&auto=format&fit=crop"
                        alt="Afternoon Tea Set">
                </div>
            </div>
            <div class="col-6 col-sm-8">
                <div class="box box52">
                    <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=500&auto=format&fit=crop"
                        alt="Chocolate Cookies">
                </div>
            </div>
        </div>
    </div>

</body>

</html>
