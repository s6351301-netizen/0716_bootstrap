<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <title>DORO 純淨放圖樂園</title>
</head>
<style>
  body {
    background-color: #fff0f5;
    color: #4a3b42;
  }

  /* 充滿 DORO 元素的滿配導覽列樣式 */
  .navbar {
    background-color: #ffb7c5 !important;
    /* 換回溫柔粉色 */
    box-shadow: 0 4px 10px rgba(255, 183, 197, 0.4);
  }

  .navbar-brand {
    color: #ffffff !important;
    font-weight: 900;
    font-size: 1.4rem;
  }

  .nav-link {
    color: #ffffff !important;
    font-weight: bold;
    opacity: 0.9;
  }

  .nav-link:hover,
  .nav-link.active {
    opacity: 1;
    color: #ff4d79 !important;
    /* 滑過去變成草莓粉 */
  }

  /* 搜尋按鈕也改成 DORO 專用粉 */
  .btn-doro {
    color: #ffffff;
    border-color: #ffffff;
    font-weight: bold;
  }

  .btn-doro:hover {
    background-color: #ff4d79;
    border-color: #ff4d79;
    color: #ffffff;
  }

  /* 2~10號普通格子：堅決不亂變大的傲嬌格子 */
  .grid-box {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 15px;
    overflow: hidden;
    padding: 0;
    height: auto;
    width: auto;

    /* 💡 修正1：只針對 transform 做動畫，不要用 all，並延長到 0.3s 會更平滑 */
    transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);

    /* 💡 修正2：告訴瀏覽器這傢伙要放大，請提早準備好顯示卡加速 */
    will-change: transform;
  }

  /* 搞笑效果：滑鼠移過去格子會放大、旋轉、加深陰影 */
  .grid-box:hover {
    transform: scale(1.1) rotate(2deg);
    z-index: 10;
  }

  /* 圖片設定：沒那麼大的別亂變大 */
  .grid-box img {
    width: auto;
    height: auto;
    max-width: 100%;
    display: block;
    border-radius: 35px;
  }

  /* 原始大輪播圖樣式 */
  #demo {
    overflow: hidden;
  }

  #demo .carousel-item {
    text-align: center;
    background-color: #ffe4e1;
  }

  #demo .carousel-item img {
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 400px;
    display: inline-block;
  }

  /* 原始小輪播圖（格子1） */
  #box-1 {
    display: flex;
    background-color: #ffb7c5;
    padding: 0;
    border-radius: 35px;
  }

  .carousel-custom-item {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
  }

  #demo2-inner img {
    width: auto;
    height: auto;
    max-width: 100%;
    border-radius: 35px;
  }

  .row {
    border-radius: 35px;
    justify-content: center;
  }

  /* 2~10號格子的 DORO 繽紛配色 */
  .grid-box[id^="box-"] {
    border-radius: 35px;
  }

  #box-2,
  #box-3 {
    background-color: #ff9999;
    box-shadow: 5px 3px 8px rgba(255, 153, 153, 0.5);
  }

  #box-4,
  #box-5,
  #box-6 {
    background-color: #ffb366;
    box-shadow: 5px 3px 8px rgba(255, 179, 102, 0.5);
  }

  #box-7,
  #box-8,
  #box-9,
  #box-10 {
    background-color: #ea9999;
    box-shadow: 5px 3px 8px rgba(234, 153, 153, 0.5);
  }
</style>

<body>
  <!-- DORO 化的進階滿配導覽列 -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="https://www.youtube.com/watch?v=nPKF2boIMqM">DORO 樂園 (。_。)</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">聖殿首頁</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">尋找桃樂絲</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              DORO 語錄選單
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">道路隆 (도로롱)</a></li>
              <li><a class="dropdown-item" href="#">管好你自己 (。_。)</a></li>
              <li>
                <hr class="dropdown-divider">
              </li>
              <li><a class="dropdown-item" href="#">看見這把火槍了嗎？</a></li>
            </ul>
          </li>
          <li class="nav-item">
            <a class="nav-link disabled" aria-disabled="true">小圖堅決不放大</a>
          </li>
        </ul>
        <form class="d-flex" role="search" onsubmit="alert('抓不到啦！(。_。)法網恢恢疏而不漏'); return false;">
          <input class="form-control me-2" type="search" placeholder="輸入「道路隆」試試看..." aria-label="Search" />
          <button class="btn btn-doro btn-outline-light" type="submit">捕捉 Doro</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- 大輪播圖 -->
  <div id="demo" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner" id="demo-inner">
      <div class="carousel-item active">
        <img src="/doro/devil-may-cry-vergil.gif" alt="">
      </div>

      <div class="carousel-item">
        <div class="mx-auto" style="max-width: 711px;">
          <div class="ratio ratio-16x9">
            <iframe id="doro-player" width="560" height="315"
              src="https://www.youtube-nocookie.com/embed/nPKF2boIMqM?autoplay=1&mute=1&enablejsapi=1" title="YouTube video player"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
          </div>
        </div>
      </div>

      <div class="carousel-item">
        <img src="./doro/doro (1).gif" alt="">
      </div>
      <div class="carousel-item">
        <img src="./doro/doro-cat-spining.gif" alt="">
      </div>
      
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev"></button>
    <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next"></button>
  </div>

  <hr>

  <div class="text-center px-3">

    <!-- 小輪播圖與網格區 -->
    <div id="c1"></div>
    <div class="container mb-4">
      <div class="row">
        <div class="col grid-box" id="box-1">
          <div id="demo2" class="carousel slide w-100" data-bs-ride="carousel">
            <div class="carousel-inner" id="demo2-inner">
              <div class="carousel-item active">
                <div class="carousel-custom-item">
                  <img src="./doro/doro-doroception.gif" alt="">
                </div>
              </div>
              <div class="carousel-item">
                <div class="carousel-custom-item">
                  <img src="./doro/doro-dorothy (1).gif" alt="">
                </div>
              </div>
              <div class="carousel-item">
                <div class="carousel-custom-item">
                  <img src="./doro/doro-dorothy (2).gif" alt="">
                </div>
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#demo2" data-bs-slide="prev"></button>
            <button class="carousel-control-next" type="button" data-bs-target="#demo2" data-bs-slide="next"></button>
          </div>
        </div>
      </div>
    </div>

    <div id="c2"></div>
    <div class="container mb-3">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <div class="grid-box" id="box-2"><img src="./doro/doro-dorothy.gif" alt=""></div>
        </div>
        <div class="col-12 col-md-6">
          <div class="grid-box" id="box-3"><img src="./doro/doro-flying.gif" alt=""></div>
        </div>
      </div>
    </div>

    <div id="c3"></div>
    <div class="container mb-3">
      <div class="row g-3">
        <div class="col-12 col-md-4">
          <div class="grid-box" id="box-4"><img src="./doro/doro-majima.gif" alt=""></div>
        </div>
        <div class="col-12 col-md-4">
          <div class="grid-box" id="box-5"><img src="./doro/doro-nikke (1).gif" alt=""></div>
        </div>
        <div class="col-12 col-md-4">
          <div class="grid-box" id="box-6"><img src="./doro/doro-nikke.gif" alt=""></div>
        </div>
      </div>
    </div>

    <div id="c4"></div>
    <div class="container mb-3">
      <div class="row g-3">
        <div class="col-6 col-md-3">
          <div class="grid-box" id="box-7"><img src="./doro/stellar-blade-doro.gif" alt=""></div>
        </div>
        <div class="col-6 col-md-3">
          <div class="grid-box" id="box-8"><img src="./doro/doro-도로롱.gif" alt=""></div>
        </div>
        <div class="col-6 col-md-3">
          <div class="grid-box" id="box-9"><img src="./doro/doro.gif" alt=""></div>
        </div>
        <div class="col-6 col-md-3">
          <div class="grid-box" id="box-10"><img src="./doro/dorochill.gif" alt=""></div>
        </div>
      </div>
    </div>

  </div>
</body>

</html>
