<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background-color: #000;
        }

        .box {
            height: 25vh;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: sans-serif;
            font-size: 14px;
            position: relative;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes spinReverse {
            to { transform: rotate(-360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .progress-ring {
            --p: 0;
        }
        .progress-ring::before {
            content: "";
            position: absolute;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: #000;
        }
        .progress-ring span {
            position: relative;
            z-index: 1;
        }

        .loader11 {
            background: conic-gradient(#00e5ff calc(var(--p) * 1%), #222 0);
        }

        .loader21 {
            background: conic-gradient(#ffe600, transparent);
            animation: spin 2s linear infinite;
        }
        .loader21::before {
            content: "";
            position: absolute;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: #000;
        }
        .loader21 span {
            position: relative;
            z-index: 1;
        }

        .loader22 {
            border: 3px dashed #b4ff39;
            animation: spin 4s linear infinite;
        }

        .loader31 {
            background: conic-gradient(#00c8ff calc(var(--p) * 1%), #eaffff 0);
        }

        .loader32 {
            border: 3px solid #00bfff;
        }
        .loader32 .dot {
            width: 8px;
            height: 8px;
            background: #ffe600;
            border-radius: 50%;
            margin: 0 3px;
            animation: pulse 1s infinite;
        }
        .loader32 .dot:nth-child(2) { animation-delay: .2s; }
        .loader32 .dot:nth-child(3) { animation-delay: .4s; }

        .loader33 {
            background: repeating-conic-gradient(#333 0deg 40deg, #0aa 40deg 45deg);
            animation: spin 6s linear infinite;
        }

        .loader41 {
            border: 3px dashed #3399ff;
            border-top-color: transparent;
            border-right-color: transparent;
            animation: spin 3s linear infinite;
        }
        .loader41 span {
            display: inline-block;
            animation: spinReverse 3s linear infinite;
        }

        .loader42 .ring {
            position: absolute;
            inset: 0;
            animation: spin 3s linear infinite;
        }
        .loader42 .ring i {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #00c8ff;
            border-radius: 50%;
        }
        .loader42 .ring i:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
        .loader42 .ring i:nth-child(2) { top: 15%; right: 5%; }
        .loader42 .ring i:nth-child(3) { bottom: 15%; right: 5%; }
        .loader42 .ring i:nth-child(4) { bottom: 0; left: 50%; transform: translateX(-50%); }
        .loader42 .ring i:nth-child(5) { bottom: 15%; left: 5%; }
        .loader42 .ring i:nth-child(6) { top: 15%; left: 5%; }

        .loader43 {
            background: conic-gradient(#2ec4b6 calc(var(--p) * 1%), #123 0);
        }

        .loader44 {
            border: 3px solid transparent;
            border-top-color: #00c8ff;
            border-bottom-color: #00c8ff;
            animation: spin 2.5s linear infinite;
        }

        .loader51 {
            background: conic-gradient(#555 calc(var(--p) * 1%), #111 0);
        }
        .loader51 span {
            color: #ffb703;
        }

        .loader52 {
            background: conic-gradient(#00c8ff calc(var(--p) * 1%), transparent 0);
            border: 3px dashed #2ec4b6;
        }
    </style>
</head>

<body>

    <!-- nav -->
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="javascript:void(0)">Logo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#first">Link</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#second">Link</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#third">Link</a>
                    </li>
                </ul>
                <form class="d-flex">
                    <input class="form-control me-2" type="text" placeholder="Search">
                    <button class="btn btn-primary" type="button">Search</button>
                </form>
            </div>
        </div>
    </nav>
    <!-- nav end -->

    <!-- carousel -->
    <div id="demo" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="3"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="4"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://picsum.photos/id/237/1920/500" alt="Los Angeles" class="d-block" style="width:100%">
            </div>
            <div class="carousel-item">
                <img src="https://picsum.photos/id/238/1920/500" alt="Chicago" class="d-block" style="width:100%">
            </div>
            <div class="carousel-item">
                <img src="https://picsum.photos/id/239/1920/500" alt="New York" class="d-block" style="width:100%">
            </div>
            <div class="carousel-item">
                <img src="https://picsum.photos/id/240/1920/500" alt="New York" class="d-block" style="width:100%">
            </div>
            <div class="carousel-item">
                <img src="https://picsum.photos/id/241/1920/500" alt="New York" class="d-block" style="width:100%">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
    <!-- carousel end-->

    <div class="container" id="first">
        <!-- 第1列 -->
        <div class="row">
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader11 progress-ring" data-target="85">
                        <span data-num>0%</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader21"><span>LOADING</span></div>
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader22">LOADING</div>
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader31 progress-ring" data-target="85">
                        <span data-num>0%</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 第2列 -->
        <div class="row" id="second">
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader32">
                        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader33"></div>
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader41"><span>LOADING</span></div>
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader42">
                        <div class="ring">
                            <i></i><i></i><i></i><i></i><i></i><i></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 第3列 -->
        <div class="row" id="third">
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader43 progress-ring" data-target="85">
                        <span data-num>0%</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader44"></div>
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader51 progress-ring" data-target="22">
                        <span data-num>0%</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-sm-3">
                <div class="box">
                    <div class="loader loader52 progress-ring" data-target="85">
                        <span data-num>0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function animateProgress(el, duration) {
            const target = parseInt(el.dataset.target, 10);
            const numEl = el.querySelector('[data-num]');
            const start = performance.now();

            function tick(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const current = Math.round(target * progress);

                el.style.setProperty('--p', current);
                numEl.textContent = current + '%';

                if (progress < 1) {
                    requestAnimationFrame(tick);
                } else {
                    setTimeout(() => animateProgress(el, duration), 1500);
                }
            }
            requestAnimationFrame(tick);
        }

        document.querySelectorAll('.progress-ring').forEach(el => {
            animateProgress(el, 2000);
        });
    </script>

</body>

</html>
