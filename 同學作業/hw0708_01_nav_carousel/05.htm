<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">


<title>Gallery Carousel Layout Engine</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">


<style>

body{
background:#f5f5f5;
}


.nav-link{
cursor:pointer;
}


.card{
cursor:move;
}


.card img,
.carousel img{

height:220px;
object-fit:cover;

}



/* Layout5 */

.masonry{

display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;

}


.masonry .card{

break-inside:avoid;

}



@media(max-width:992px){

.masonry{

grid-template-columns:repeat(3,1fr);

}

}



@media(max-width:576px){

.masonry{

grid-template-columns:repeat(2,1fr);

}

}



</style>


</head>



<body>



<nav class="navbar navbar-expand-lg navbar-dark bg-dark">


<div class="container-fluid">


<a class="navbar-brand">
Gallery Engine
</a>



<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarMenu">


<span class="navbar-toggler-icon"></span>


</button>




<div class="collapse navbar-collapse"
id="navbarMenu">



<ul class="navbar-nav me-auto mb-2 mb-lg-0">


<li class="nav-item">
<a class="nav-link"
onclick="layout(1)">
Layout1
</a>
</li>


<li class="nav-item">
<a class="nav-link"
onclick="layout(2)">
Layout2
</a>
</li>


<li class="nav-item">
<a class="nav-link"
onclick="layout(3)">
Layout3
</a>
</li>


<li class="nav-item">
<a class="nav-link"
onclick="layout(4)">
Layout4
</a>
</li>


<li class="nav-item">
<a class="nav-link"
onclick="layout(5)">
Layout5
</a>
</li>


</ul>



<div class="d-flex align-items-center gap-2 mb-2 mb-lg-0">


<label class="text-white">
秒
</label>


<input
id="speed"
type="number"
value="3"
min="1"
class="form-control"
style="width:70px"
onchange="changeSpeed()">



<div class="form-check form-switch">


<input
id="switch"
class="form-check-input"
type="checkbox"
checked
onchange="render()">



<label class="text-white">
Carousel
</label>


</div>


</div>



</div>


</div>

</nav>





<div class="container my-4">


<div id="gallery"></div>


</div>






<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



<script>



let images=[

"圖片01",
"圖片02",
"圖片03",
"圖片04",
"圖片05",
"圖片06",
"圖片07",
"圖片08",
"圖片09",
"圖片10"

];


let current=1;


let time=3000;


let dragIndex=null;






function img(i){

return "https://picsum.photos/900/500?random="+(i+1);

}





/*
循環資料
*/

function getLoop(start,count)
{

let arr=[];


for(let i=0;i<count;i++)
{

let index=
(start+i)%images.length;


arr.push({

title:images[index],

url:img(index)

});

}


return arr;

}





function layout(x)
{

current=x;

render();


}



function changeSpeed()
{

time=
document.getElementById("speed").value*1000;


render();

}








/*
Carousel
*/

function carousel(id,data)
{


let html=`

<div id="${id}"
class="carousel slide"
data-bs-interval="${time}">


<div class="carousel-inner">


`;


data.forEach((x,i)=>{


html+=`

<div class="carousel-item ${i==0?'active':''}">


<img src="${x.url}"
class="d-block w-100">


<div class="carousel-caption">

${x.title}

</div>


</div>

`;

});



html+=`

</div>



<button class="carousel-control-prev"
type="button"
data-bs-target="#${id}"
data-bs-slide="prev">


<span class="carousel-control-prev-icon"></span>


</button>



<button class="carousel-control-next"
type="button"
data-bs-target="#${id}"
data-bs-slide="next">


<span class="carousel-control-next-icon"></span>


</button>


</div>


`;

return html;


}







function initCarousel()
{


document
.querySelectorAll(".carousel")
.forEach(el=>{


let c=
bootstrap.Carousel.getOrCreateInstance(
el,
{

interval:time,

pause:false,

touch:true

});


c.cycle();


});


}







function render()
{


gallery.innerHTML="";


let enable=
document.getElementById("switch").checked;



if(!enable)
{

renderGrid();

return;

}




switch(current)
{


case 1:


gallery.innerHTML=
carousel(
"c1",
getLoop(0,10)
);

break;




case 2:


gallery.innerHTML=`

<div class="row g-3">

<div class="col-md-6">

${carousel(
"c21",
getLoop(0,5)
)}

</div>


<div class="col-md-6">

${carousel(
"c22",
getLoop(5,5)
)}

</div>


</div>

`;

break;




case 3:


gallery.innerHTML=`

<div class="row g-3">

${[0,3,6,9].map((x,i)=>`

<div class="col-md-4">

${carousel(
"c3"+i,
getLoop(x,3)
)}

</div>

`).join("")}

</div>

`;

break;




case 4:


gallery.innerHTML=`

<div class="row g-3">


${images.map((x,i)=>`

<div class="col-md-3">


${carousel(
"c4"+i,
getLoop(i,4)
)}


</div>


`).join("")}


</div>

`;

break;





case 5:


gallery.innerHTML=`

<div class="masonry">


${images.map((x,i)=>`


<div class="card">


${carousel(
"c5"+i,
getLoop(i,5)
)}



<div class="card-body">

${x}

</div>



</div>


`).join("")}


</div>

`;

break;


}



setTimeout(initCarousel,100);


}







function renderGrid()
{


gallery.innerHTML=`

<div class="row g-3">


${images.map((x,i)=>`

<div class="col-md-3">


<div class="card">


<img src="${img(i)}"
class="card-img-top">


<div class="card-body">

${x}

</div>


</div>


</div>


`).join("")}


</div>

`;

}





/*
Swipe
*/


let startX=0;


document.addEventListener(
"touchstart",
e=>{

startX=e.touches[0].clientX;

});



document.addEventListener(
"touchend",
e=>{


let endX=
e.changedTouches[0].clientX;



let active=
document.querySelector(".carousel-item.active");



if(!active)return;



let box=
active.closest(".carousel");



let c=
bootstrap.Carousel.getOrCreateInstance(box);



if(startX-endX>50)
c.next();


if(endX-startX>50)
c.prev();



});




render();


</script>


</body>

</html>
