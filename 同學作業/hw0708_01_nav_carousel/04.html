<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <title>宗親會 - 官方網站</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 56px; }
        .search-row { background: #e9ecef; padding: 15px; border-bottom: 1px solid #dee2e6; }
        .full-section { min-height: 100vh; padding: 60px 20px; }
        .carousel-item { height: 90vh; }
        .carousel-item img { object-fit: cover; height: 100%; width: 100%; filter: brightness(0.7); }
        .navbar { background-color: #8b0000; } /* 莊重紅色系 */
    </style>
</head>
<body>

    <!-- 頂部導覽列 -->
    <nav class="navbar navbar-dark fixed-top">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand" href="#">某氏宗親會</a>
            <div></div>
        </div>
    </nav>

    <!-- 獨立搜尋列 -->
    <div class="search-row">
        <div class="container-fluid">
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="搜尋族譜、公告...">
                <button class="btn btn-dark" type="submit">搜尋</button>
            </form>
        </div>
    </div>

    <!-- 左側選單 -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="menu">
        <div class="offcanvas-header"><h5 class="offcanvas-title">選單</h5><button class="btn-close" data-bs-dismiss="offcanvas"></button></div>
        <div class="offcanvas-body">
            <ul class="navbar-nav">
                <li class="nav-item border-bottom"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#loginModal">會員登入</a></li>
                <li class="nav-item border-bottom"><a class="nav-link" href="#">關於宗親會</a></li>
                <li class="nav-item border-bottom"><a class="nav-link" href="#">年度祭祖活動</a></li>
                <li class="nav-item border-bottom"><a class="nav-link" href="#">族譜查詢</a></li>
            </ul>
        </div>
    </div>

    <!-- 輪播圖 (宗親會主題) -->
    <div id="mainCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://picsum.photos/1920/1080?祭祖" alt="祭祖大典">
                <div class="carousel-caption"><h1>年度祭祖大典</h1><p>慎終追遠，傳承祖德</p></div>
            </div>
            <div class="carousel-item">
                <img src="https://picsum.photos/1920/1080?聚會" alt="宗親聚會">
                <div class="carousel-caption"><h1>宗親聯誼活動</h1><p>凝聚家族力量，聯繫情感</p></div>
            </div>
        </div>
    </div>

    <!-- 會員登入視窗 (使用 Bootstrap 驗證) -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <form class="modal-content needs-validation" novalidate>
                <div class="modal-header"><h5>會員登入</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">帳號</label>
                        <input type="text" class="form-control" required>
                        <div class="invalid-feedback">請輸入帳號</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密碼</label>
                        <input type="password" class="form-control" required>
                        <div class="invalid-feedback">請輸入密碼</div>
                    </div>
                </div>
                <div class="modal-footer"><button type="submit" class="btn btn-primary">登入</button></div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 啟用表單驗證
        (() => {
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>
</body>
</html>
