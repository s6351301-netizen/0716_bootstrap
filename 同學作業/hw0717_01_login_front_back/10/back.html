<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <title>🐾 喵嗚咖啡廳 | 貓員工總管後台</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<style>
  /* 貓咖主題核心配色 */
  body {
    background-color: #FAF4EE !important; /* 溫馨燕麥奶茶色背景 */
    font-family: "Microsoft JhengHei", sans-serif;
  }

  /* 溫柔貓咖導覽列 */
  .navbar-catcafe {
    background-color: #8B5A2B !important; /* 濃郁咖啡棕 */
    border-bottom: 4px solid #E6A23C; /* 焦糖金黃邊框 */
  }

  /* 🌟 核心修正：強制導覽列文字在桌機版絕對不換行，且稍微縮小字體 */
  .navbar-catcafe .nav-link, 
  .navbar-catcafe .navbar-brand {
    white-space: nowrap !important; /* 強制不換行 */
  }
  
  @media (min-width: 992px) and (max-width: 1200px) {
    .navbar-catcafe .nav-link {
      font-size: 0.9rem; /* 在中等螢幕時微調字體，防止擠出去 */
      padding-left: 0.5rem !important;
      padding-right: 0.5rem !important;
    }
  }

  /* 貓咪粉紅特製按鈕 */
  .btn-cat-pink {
    background-color: #FFB6C1 !important; /* 肉墊粉紅 */
    color: #4A2711 !important;
    border: none !important;
    font-weight: bold;
    border-radius: 20px;
    transition: all 0.2s;
  }
  .btn-cat-pink:hover {
    background-color: #FFA07A !important;
    transform: scale(1.05);
  }

  /* 咖啡色系按鈕 */
  .btn-cat-brown {
    background-color: #D2B48C !important; /* 熱可可色 */
    color: #4A2711 !important;
    border: none !important;
    font-weight: bold;
    border-radius: 20px;
  }
  .btn-cat-brown:hover {
    background-color: #8B5A2B !important;
    color: #FFF !important;
  }

  /* 表格特製樣式 */
  .cat-table-card {
    border-radius: 20px;
    overflow: hidden;
    border: 2px solid #E8D8C8;
  }
  .table-cat-header {
    background-color: #F3E5D8 !important;
    color: #623A18 !important;
  }

  /* 欄位寬度與對齊 */
  .col-width-20 { width: 20%; }
  .col-width-30 { width: 30%; }
  .col-width-50 { width: 50%; }
  
  th, td {
    vertical-align: middle !important;
  }

  /* 彈出視窗圓角化 */
  .modal-content {
    border-radius: 25px !important;
    border: 3px solid #FFB6C1 !important;
  }
</style>
<body>

    <!-- 🐾 貓咖專屬導覽列 -->
    <!-- 🌟 將 navbar-expand-lg 可以考慮維持，但內文做了安全保護 -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-catcafe sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <img src="./logocats.jpg" alt="LOGO" style="height: 40px; width: auto;" class="me-2 rounded-circle border border-2 border-white"> 
                <span style="letter-spacing: 1px;">🐾 喵嗚咖啡廳後台</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#cafeNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="cafeNavbar">
                <!-- 🌟 加上了 px-xl-3 等彈性留白，讓中間的字有更多空間 -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 fw-medium">
                    <li class="nav-item"><a class="nav-link active text-warning" href="#">🐱 貓員工值班表</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="#">☕ 罐罐與菜單管理</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50" href="#">💰 摸摸券營收</a></li>
                </ul>
                <div class="d-flex gap-2 mt-3 mt-lg-0">
                    <button onclick="location.href='front.html'" class="btn btn-outline-light rounded-pill px-3 btn-sm">
                        返回前台看貓咪 🏠
                    </button>
                    <button onclick="location.href='login.html'" class="btn btn-light rounded-pill px-3 text-danger fw-bold btn-sm">
                        登出開溜 🚪
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 🐾 主要內容區 -->
    <div class="container my-5 bg-white p-4 p-md-5 rounded-4 shadow-sm" style="border: 1px solid #EEDCD0;">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="h4 mb-0 fw-bold" style="color: #623A18;">🐈 點點名！現役貓員工列表</h2>
          <button class="btn btn-cat-pink px-4 py-2 shadow-sm" data-bs-toggle="modal" data-bs-target="#addModal">
              🐾 招募新貓貓 (新增)
          </button>
      </div>

      <!-- 資料表格 -->
      <div class="table-responsive cat-table-card shadow-sm">
        <table class="table table-hover mb-0">
          <thead class="table-cat-header fw-bold">
            <tr>
              <th class="col-width-20 py-3 ps-4 text-start">編號 (ID)</th>
              <th class="col-width-30 py-3 text-start">貓咪大名</th>
              <th class="col-width-50 py-3 text-center">罐罐權限操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="fw-bold text-muted ps-4 text-start">1</td>
              <td class="fw-bold text-dark fs-5 text-start">🐈‍⬛ blackcat (小黑)</td>
              <td class="text-center">
                  <button type="button" class="btn btn-sm btn-cat-brown px-3 me-2" data-bs-toggle="modal" data-bs-target="#editModal1">
                      ✏️ 更改資料
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-danger rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#deleteModal">
                      ❌ 解僱送養
                  </button>
              </td>
            </tr>
            <tr>
              <td class="fw-bold text-muted ps-4 text-start">2</td>
              <td class="fw-bold text-dark fs-5 text-start"></td>
              <td class="text-center">
                  <button type="button" class="btn btn-sm btn-cat-brown px-3 me-2" data-bs-toggle="modal" data-bs-target="#editModal2">
                      ✏️ 更改資料
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-danger rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#deleteModal">
                      ❌ 解僱送養
                  </button>
              </td>
            </tr>
            <tr>
              <td class="fw-bold text-muted ps-4 text-start">3</td>
              <td class="fw-bold text-dark fs-5 text-start">🐈 cat (大橘)</td>
              <td class="text-center"> 
                  <button type="button" class="btn btn-sm btn-cat-brown px-3 me-2" data-bs-toggle="modal" data-bs-target="#editModal3">
                      ✏️ 更改資料
                  </button>
                  <button type="button" class="btn btn-sm btn-outline-danger rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#deleteModal">
                      ❌ 解僱送養
                  </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modals 區塊維持不變... -->
    <!-- (這裡省略以保持回應乾淨，你原本的 Modal 程式碼可以直接貼在 body 結束前) -->

</body>
</html>
