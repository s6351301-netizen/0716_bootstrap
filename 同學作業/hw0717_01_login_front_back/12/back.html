<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  
  <style>
    .img-container {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 新增：包裹按鈕與文字的容器 */
    .btn-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -150%);
      display: flex;
      flex-direction: column; /* 垂直排列 */
      align-items: center;    /* 水平置中 */
      gap: 15px;              /* 文字與按鈕間距 */
      z-index: 10;
    }

    /* 新增：上方文字樣式 */
    .upload-text {
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.5); /* 增加陰影讓白色文字更清楚 */
      white-space: nowrap; /* 防止文字換行 */
    }

    .center-btn {
      width: 120px;
      height: 120px;
      border-radius: 50% !important;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0; 
      border: none;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-sm bg-dark navbar-dark">
  <div class="container-fluid">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link active" href="#">貓的後台</a>
      </li>
    </ul>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item">
        <a href="main.html" class="btn btn-warning">回到首頁</a>
      </li>
    </ul>
  </div>
</nav>

<div class="img-container">
  <img src="./images/45.jpg" alt="貓咪圖片">
  
  <!-- 新增的容器：包含文字與按鈕 -->
  <div class="btn-container">
    <div class="upload-text">點選屁眼上傳圖片</div>
    <button type="button" class="btn btn-primary center-btn" data-bs-toggle="modal" data-bs-target="#myModal">
      選擇檔案
    </button>
  </div>
</div>

<!-- Modal 維持不變 -->
<div class="modal" id="myModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">上傳圖片</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">你即將上傳圖片，請問確認要上傳嗎？</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary">確認</button>
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">取消</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
