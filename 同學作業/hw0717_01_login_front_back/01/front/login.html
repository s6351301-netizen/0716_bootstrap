<!DOCTYPE html>
<html lang="en">

<head>
     <title>管理員登入 - 尋找貓咪的家</title>
     <meta charset="utf-8">
     <meta name="viewport" content="width=device-width, initial-scale=1">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
     <style>
          body {
               background: #faf8f6;
               font-family: system-ui, sans-serif;
               height: 100vh;
               display: flex;
               align-items: center;
               justify-content: center;
          }

          .login-card {
               background: #fff;
               border: 1px solid #eae5e0;
               border-radius: 12px;
               padding: 40px;
               width: 100%;
               max-width: 400px;
               box-shadow: 0 4px 12px rgba(140, 131, 123, 0.05);
          }

          .brand-title {
               color: #c08a70;
               font-weight: bold;
               font-size: 22px;
               text-align: center;
               margin-bottom: 8px;
          }

          .brand-subtitle {
               color: #8c837b;
               font-size: 14px;
               text-align: center;
               margin-bottom: 30px;
          }

          .form-label {
               color: #4a4540;
               font-weight: 500;
               font-size: 14px;
          }

          .form-control {
               border-radius: 6px;
               border: 1px solid #eae5e0;
               font-size: 14px;
               padding: 10px 12px;
               background: #faf8f6;
               margin-bottom: 20px;
          }

          .form-control:focus {
               border-color: #c08a70;
               box-shadow: none;
               background: #fff;
          }

          .btn-login {
               background: #c08a70;
               color: #fff !important;
               border: none;
               border-radius: 6px;
               font-size: 15px;
               font-weight: 500;
               width: 100%;
               padding: 10px;
               transition: background 0.2s;
          }

          .btn-login:hover {
               background: #ab775e;
          }

          .back-home {
               display: block;
               text-align: center;
               margin-top: 20px;
               color: #7d756d;
               font-size: 13px;
               text-decoration: none;
          }

          .back-home:hover {
               color: #c08a70;
          }
     </style>
</head>

<body>

     <div class="login-card">
          <div class="brand-title">🐾 尋找貓咪的家</div>
          <div class="brand-subtitle">管理員後台登入</div>

          <!-- 登入表單 -->
          <form id="loginForm">
               <div class="mb-3">
                    <label for="username" class="form-label">管理員帳號</label>
                    <input type="text" class="form-control" id="username" placeholder="請輸入帳號" required>
               </div>
               <div class="mb-3">
                    <label for="password" class="form-label">密碼</label>
                    <input type="password" class="form-control" id="password" placeholder="請輸入密碼" required>
               </div>
               <button type="submit" class="btn btn-login mt-2">登入系統</button>
          </form>

          <a href="../index.html" class="back-home">← 回到前台首頁</a>
     </div>

     <script>
          // 這裡用前端 JavaScript 簡單模擬登入跳轉
          document.getElementById('loginForm').addEventListener('submit', function (e) {
               e.preventDefault(); // 阻止表單預設送出行為

               // 獲取輸入的值（之後你可以串接 PHP 後端驗證）
               const user = document.getElementById('username').value;
               const pass = document.getElementById('password').value;

               // 取得使用者輸入的帳號名稱
               const username = document.getElementById('username').value;

               // 儲存至瀏覽器
               localStorage.setItem("isLoggedIn", "true");
               localStorage.setItem("adminName", username); // <-- 確保登入頁有這行，首頁才抓得到名字！

               // 簡單範例：點擊登入後，直接導回你原本的列表頁面 (假設舊檔名是 index.html)
               // 如果你的後台主頁是其他檔案，可以改成對應的檔名，例如：admin_dashboard.html
               alert('登入成功！正在前往管理後台...');
               window.location.href = '../admin.html';
          });
     </script>

</body>

</html>
