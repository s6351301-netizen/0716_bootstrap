<!DOCTYPE html>
<html lang="en">

<head>
     <title>尋找貓咪的家</title>
     <meta charset="utf-8">
     <meta name="viewport" content="width=device-width, initial-scale=1">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
     <style>
          body {
               background: #faf8f6;
               font-family: system-ui, sans-serif;
          }

          h2 {
               color: #4a4540;
               font-weight: 700;
               font-size: 24px;
               margin-top: 30px;
          }

          .navbar {
               background: #fff !important;
               border-bottom: 1px solid #eae5e0;
               padding: 12px 16px;
          }

          .navbar-brand {
               color: #c08a70 !important;
               font-weight: bold;
               font-size: 18px;
               letter-spacing: 0.5px;
          }

          .nav-link {
               color: #7d756d !important;
               font-weight: 500;
               margin-right: 15px;
               font-size: 14px;
          }

          .nav-link:hover {
               color: #c08a70 !important;
          }

          .navbar .form-control {
               border-radius: 6px;
               border: 1px solid #eae5e0;
               font-size: 14px;
               padding-left: 12px;
               background: #faf8f6;
          }

          .navbar .form-control:focus {
               border-color: #c08a70;
               box-shadow: none;
               background: #fff;
          }

          .navbar .btn-primary,
          .btn-primary {
               display: inline-block;
               background: #c08a70;
               color: #fff !important;
               border: none;
               border-radius: 6px;
               font-size: 14px;
               font-weight: 500;
               text-decoration: none;
               transition: background 0.2s;
          }

          .navbar .btn-primary {
               padding: 6px 16px;
               margin-left: 8px;
          }

          .navbar .btn-primary:hover,
          .btn-primary:hover {
               background: #ab775e;
          }

          form label {
               color: #5c554e;
               font-weight: 500;
               margin-bottom: 8px;
               font-size: 14px;
          }

          .container .form-control {
               border-radius: 6px;
               border: 1px solid #eae5e0;
               padding: 10px 14px;
               font-size: 14px;
               background: #fff;
          }

          .container .form-control:focus {
               border-color: #c08a70;
               box-shadow: none;
          }

          .container .btn-primary {
               padding: 8px 24px;
               margin-top: 10px;
          }
     </style>
</head>

<body>

     <nav class="navbar navbar-expand-sm navbar-light bg-white">
          <div class="container-fluid">
               <a class="navbar-brand" href="javascript:void(0)">🐾 尋找貓咪的家</a>
               <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                    <span class="navbar-toggler-icon"></span>
               </button>
               <div class="collapse navbar-collapse" id="mynavbar">
                    <ul class="navbar-nav me-auto">
                         <li class="nav-item">
                              <a class="nav-link" href="../index.html">待收養貓咪</a>
                         </li>
                         <li class="nav-item">
                              <a class="nav-link" href="">志工夥伴</a>
                         </li>
                         <li class="nav-item">
                              <a class="nav-link" href="javascript:void(0)">領養諮詢</a>
                         </li>
                    </ul>
                    <form class="d-flex">
                         <input class="form-control" type="text" placeholder="搜尋貓咪...">
                         <button class="btn btn-primary" type="button">搜尋</button>
                    </form>
               </div>
          </div>
     </nav>

     <div class="container mt-3">
          <h2>登記新貓咪</h2>
          <form action="./store.html" method="GET" enctype="multipart/form-data">
               <div class="mb-3 mt-4">
                    <label for="name">貓咪名字：</label>
                    <!-- 💡 拔掉了 required，現在不輸入名字也能送出測試 -->
                    <input type="text" class="form-control" id="name" placeholder="請輸入貓咪名字" name="name">
               </div>
               <div class="mb-3">
                    <label for="image">上傳照片：</label>
                    <!-- 💡 拔掉了 required，現在不上傳照片也能送出測試 -->
                    <input type="file" class="form-control" id="image" name="image" accept="image/*">
               </div>
               <button type="submit" class="btn btn-primary">確認登記</button>
               <a href="../admin.html" class="btn btn-primary ms-2">返回</a>
          </form>
     </div>

</body>

</html>
