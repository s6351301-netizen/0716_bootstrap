<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 - 日和饗宴</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #FAF6F0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #FFF;
            border: 1px solid #EAE3D2;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="card p-5 shadow login-card text-center">
        <h3 class="fw-bold mb-2" style="color: #607254;">🍃 日和饗宴</h3>
        <p class="text-muted mb-4 small">後台管理員登入</p>
        <form action="./member-index.html">
            <div class="mb-3 text-start">
                <label class="form-label text-secondary small fw-bold">帳號信箱</label>
                <input type="email" class="form-control" placeholder="admin@example.com" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label text-secondary small fw-bold">密碼</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn w-100 fw-bold text-white mb-3"
                style="background-color: #8E9F85;">立即登入後台</button>
            <a href="index.html" class="text-decoration-none text-muted small">返回前台首頁</a>
        </form>
    </div>
</body>

</html>
