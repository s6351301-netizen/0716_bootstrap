<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <title>日和饗宴 - 會員後台管理</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background-color: #FAF6F0;
            color: #4A4A4A;
        }

        .navbar {
            background-color: #8E9F85 !important;
        }

        .table-custom {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #EAE3D2;
        }
    </style>
</head>

<body>

    <!-- RWD 導覽列 -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">🍃 日和饗宴 · 後台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">返回首頁</a></li>
                    <li class="nav-item"><a class="nav-link active" href="member-index.html">會員後台管理</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 後台主區塊 -->
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-1">👥 會員與卡友後台管理</h2>
                <p class="text-muted mb-0 small">維護尊榮卡友名冊與資訊</p>
            </div>
            <!-- 新增按鈕 -->
            <button type="button" class="btn text-white fw-bold shadow-sm" style="background-color: #8E9F85;"
                data-bs-toggle="modal" data-bs-target="#createModal">
                ➕ 新增會員卡友
            </button>
        </div>

        <div class="table-custom shadow-sm bg-white p-3">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="text-center" width="15%">會員 ID</th>
                        <th class="ps-4" width="55%">卡友姓名 (Name)</th>
                        <th class="text-center" width="30%">功能操作 (Options)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-center fw-bold text-muted">1</td>
                        <td class="ps-4 fw-semibold">林雅婷 (Amy)</td>
                        <td class="text-center">
                            <button type="button" class="btn btn-sm btn-outline-primary me-2" data-bs-toggle="modal"
                                data-bs-target="#editModal" onclick="setEditName('林雅婷 (Amy)')">修改</button>
                            <a href="./del.html?id=1" class="btn btn-sm btn-outline-danger">刪除</a>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-center fw-bold text-muted">2</td>
                        <td class="ps-4 fw-semibold">陳冠宇 (Bob)</td>
                        <td class="text-center">
                            <button type="button" class="btn btn-sm btn-outline-primary me-2" data-bs-toggle="modal"
                                data-bs-target="#editModal" onclick="setEditName('陳冠宇 (Bob)')">修改</button>
                            <a href="./del.html?id=2" class="btn btn-sm btn-outline-danger">刪除</a>
                        </td>
                    </tr>
                    <tr>
                        <td class="text-center fw-bold text-muted">3</td>
                        <td class="ps-4 fw-semibold">張惠雯 (Cat)</td>
                        <td class="text-center">
                            <button type="button" class="btn btn-sm btn-outline-primary me-2" data-bs-toggle="modal"
                                data-bs-target="#editModal" onclick="setEditName('張惠雯 (Cat)')">修改</button>
                            <a href="./del.html?id=3" class="btn btn-sm btn-outline-danger">刪除</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 1. 新增會員 RWD 彈出視窗 (Modal) -->
    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form action="./store.html">
                    <div class="modal-header text-white" style="background-color: #8E9F85;">
                        <h5 class="modal-title fw-bold">新增會員資料</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-secondary">姓名 (Name):</label>
                            <input type="text" class="form-control" name="name" placeholder="請輸入欲新增卡友姓名" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn text-white fw-bold"
                            style="background-color: #8E9F85;">儲存存檔</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 2. 修改會員 RWD 彈出視窗 (Modal) -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form action="./store.html">
                    <div class="modal-header bg-dark text-white">
                        <h5 class="modal-title fw-bold">修改會員資料</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-secondary">變更姓名 (Name):</label>
                            <input type="text" class="form-control" id="edit-name-field" name="name" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary fw-bold">確認修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function setEditName(name) {
            document.getElementById('edit-name-field').value = name;
        }
    </script>
</body>

</html>
