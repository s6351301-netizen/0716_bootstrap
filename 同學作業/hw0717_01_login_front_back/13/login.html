<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禾米眼鏡 HOME OPTICAL - 會員登入</title>

    <!-- 引入 Bootstrap 5 與 Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            /* 防止漂浮鏡片溢出產生捲軸 */

            background: linear-gradient(135deg,
                    #f7f4ef,
                    #f0e5da,
                    #e3d0c1);

            font-family: "Microsoft JhengHei", -apple-system, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* ========================================================= */
        /* 漂浮鏡片動畫 (保持層級 z-index: 1 位於背景) */
        /* ========================================================= */
        .lens {
            position: absolute;
            border-radius: 50%;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, .08);
            border: 2px solid rgba(255, 255, 255, .4);
            box-shadow:
                inset 0 0 30px rgba(255, 255, 255, .7),
                0 0 40px rgba(255, 255, 255, .3);
            animation: float 14s ease-in-out infinite;
            z-index: 1;
        }

        .lens::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg,
                    transparent,
                    rgba(173, 216, 230, .25),
                    rgba(255, 255, 255, .4),
                    transparent);
        }

        .lens1 {
            width: 320px;
            height: 320px;
            left: -80px;
            top: 50px;
        }

        .lens2 {
            width: 250px;
            height: 250px;
            right: -60px;
            top: 80px;
        }

        .lens3 {
            width: 400px;
            height: 400px;
            bottom: -150px;
            left: 45%;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-35px) rotate(10deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        /* ========================================================= */
        /* 登入卡片主體 (保持層級 z-index: 10 確保可點擊) */
        /* ========================================================= */
        .login-card {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, .85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, .12);
            border-top: 10px solid #B5523C;
            z-index: 10;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            margin: auto;
            border-radius: 50%;
            background: #B5523C;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 38px;
            box-shadow: 0 8px 20px rgba(181, 82, 60, 0.2);
        }

        .brand-title {
            color: #8A3B2A;
            font-weight: bold;
            margin-top: 15px;
            font-size: 26px;
        }

        .brand-sub {
            color: #888;
            letter-spacing: 2px;
            font-size: 13px;
        }

        .welcome {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }

        .form-label {
            color: #555;
            font-size: 14px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #ddd;
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.6);
        }

        .form-control:focus {
            border-color: #B5523C;
            background-color: #fff;
            box-shadow: 0 0 0 .2rem rgba(181, 82, 60, .15);
        }

        .btn-login {
            background: #B5523C;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-login:hover {
            background: #9a4431;
            transform: translateY(-1px);
        }

        .register-box {
            border-top: 1px solid #eee;
            margin-top: 25px;
            padding-top: 20px;
        }

        .register-link {
            text-decoration: none;
            color: #B5523C;
            font-weight: bold;
        }

        .register-link:hover {
            color: #8A3B2A;
        }

        .footer {
            font-size: 11px;
            color: #999;
        }

        .forgot-link {
            text-decoration: none;
            color: #B5523C;
            font-size: 13px;
        }

        .forgot-link:hover {
            color: #8A3B2A;
        }

        .password-box {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            font-size: 16px;
        }

        /* 頂部貼心回首頁按鈕 */
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            text-decoration: none;
            color: #8A3B2A;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.6);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: 0.2s;
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #B5523C;
            transform: translateX(-3px);
        }

        @media(max-width:576px) {
            .login-card {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <!-- 門戶：返回首頁連結按鈕 -->
    <a href="./index.html" class="back-home">
        <i class="bi bi-arrow-left"></i> 回首頁 HOME
    </a>

    <!-- 背景：漂浮鏡片 -->
    <div class="lens lens1"></div>
    <div class="lens lens2"></div>
    <div class="lens lens3"></div>

    <!-- 登入卡片主體 -->
    <div class="login-card">

        <div class="text-center">
            <div class="logo-box">👓</div>
            <h2 class="brand-title">禾米眼鏡</h2>
            <div class="brand-sub">HOME OPTICAL</div>
            <p class="welcome mt-3">
                專業驗光 × 精準配鏡 × 視覺顧問<br>
                Professional Optometry & Vision Care
            </p>
        </div>

        <form method="post" action="login.php">
            <div class="mb-3">
                <label class="form-label fw-bold mb-1">帳號 Account</label>
                <input type="text" class="form-control" placeholder="請輸入帳號 Enter Account" name="account" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold mb-1">密碼 Password</label>
                <div class="password-box">
                    <input type="password" id="password" class="form-control" placeholder="請輸入密碼 Enter Password"
                        name="password" required>
                    <i class="bi bi-eye toggle-password" onclick="togglePassword()"></i>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label" style="font-size: 13px; color: #555;" for="remember">
                        記住密碼 Remember Me
                    </label>
                </div>
                <a href="#" class="forgot-link text-end">
                    忘記密碼？<br><span style="font-size: 11px; opacity: 0.8;">Forgot Password</span>
                </a>
            </div>

            <button type="submit" class="btn btn-login text-white w-100">
                登入 Login
            </button>
        </form>

        <div class="register-box text-center">
            <p class="mb-2 text-secondary" style="font-size: 13px;">
                還不是會員？<br>Not a Member Yet?
            </p>
            <a href="register.php" class="register-link">
                立即註冊 Register Now
            </a>
        </div>

        <div class="text-center mt-4 footer">
           <p>Copyright &copy; 2026 禾米眼鏡&nbsp;&nbsp;&nbsp;版權所有</p>
            Professional Optometry & Eyewear
        </div>

    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');

            if (pwd.type === "password") {
                pwd.type = "text";
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                pwd.type = "password";
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }
    </script>

</body>

</html>
