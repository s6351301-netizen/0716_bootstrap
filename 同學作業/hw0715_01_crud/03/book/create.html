<!DOCTYPE html>
<html lang="en">

<head>
    <title>Book Store</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">
    <!-- nav -->
    <nav class="navbar navbar-expand-sm navbar-light bg-white border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="javascript:void(0)">📚 Book Store</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav ms-auto nav-pills">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Student</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../../teacher/index.html">Teacher</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="./index.html">Book</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- nav end -->

    <div class="container mt-4" style="max-width: 480px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title mb-4">新增書籍</h4>
                <form action="./store.html">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="name" name="name" placeholder="書名">
                        <label for="name">書名</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="author" name="author" placeholder="作者">
                        <label for="author">作者</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="number" class="form-control" id="price" name="price" placeholder="價格">
                        <label for="price">價格</label>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-fill">送出</button>
                        <a href="./index.html" class="btn btn-outline-secondary flex-fill">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
