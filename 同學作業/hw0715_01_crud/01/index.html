     <style>
          body {

          }

               padding: 12px 16px;
          }

               font-weight: bold;
               font-size: 18px;
               letter-spacing: 0.5px;
          }

          .nav-link {
               color: #7d756d !important;
               font-weight: 500;
               margin-right: 15px;
               font-size: 14px;
          }

          .nav-link:hover {
               color: #c08a70 !important;
          }

          .navbar .form-control {
               border-radius: 6px;
               border: 1px solid #eae5e0;
               font-size: 14px;
               padding-left: 12px;
               background: #faf8f6;
          }

          .navbar .form-control:focus {
               border-color: #c08a70;
               box-shadow: none;
               background: #fff;
          }

          .navbar .btn-primary,
          .text-end a {
               display: inline-block;
               background: #c08a70;
               color: #fff !important;
               border: none;
               border-radius: 6px;
               font-size: 14px;
               font-weight: 500;
               text-decoration: none;
               transition: background 0.2s;
          }

          .navbar .btn-primary {
               padding: 6px 16px;
               margin-left: 8px;
          }

          .text-end a {
               padding: 8px 18px;
          }

          .navbar .btn-primary:hover,
          .text-end a:hover {
               background: #ab775e;
          }

          .table {
               background: #fff;
               border-collapse: separate;
               border-radius: 8px;
               overflow: hidden;
               border: 1px solid #eae5e0;
               margin-bottom: 40px;
          }

          .table thead th {
               background: #faf8f6 !important;
               color: #4a4540 !important;
               font-weight: 600;
               font-size: 14px;
               border-bottom: 1px solid #eae5e0;
               padding: 16px;
          }

          .table td {
               padding: 14px 16px;
               border-color: #eae5e0;
               vertical-align: middle;
               color: #5c554e;
               font-size: 14px;
          }

          .table tbody tr {
               transition: background 0.2s;
          }

          .table tbody tr:hover {
               background: #fcfbfa !important;
          }

          .table td a {
               text-decoration: none;
               font-weight: 500;
               padding: 4px 10px;
               border-radius: 4px;
               font-size: 13px;
               display: inline-block;
          }

          .table td a[href*="edit"] {
               color: #c08a70;
               border: 1px solid #eae5e0;
               background: #fff;
               margin-right: 8px;
          }

          .table td a[href*="edit"]:hover {
               background: #faf8f6;
          }

          .table td a[href*="del"] {
               color: #a84a4a;
               border: 1px solid #f2dede;
               background: #fff9f9;
          }

          .table td a[href*="del"]:hover {
               background: #f2dede;
          }

          .cat-avatar {
               width: 40px;
               height: 40px;
               border-radius: 50%;
               object-fit: cover;
               display: inline-block;
               vertical-align: middle;
          }

</head>
