<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<title>修改男友</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
background:#eef7ff;
}

.box{

width:500px;
margin:80px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px #ccc;

}

</style>

</head>


<body>


<div class="box">


<h2 class="text-center text-primary">

✏️ 修改男友資料

</h2>



<label>
姓名
</label>

<input class="form-control mb-3"
value="孔劉">



<label>
年齡
</label>

<input class="form-control mb-3"
value="28">

<div class="mb-3">

<label>
評分
</label>

<input type="number"
class="form-control"
min="0"
max="5"
step="1">

</div>

<label>
星座
</label>

<select class="form-select mb-3">

<option>摩羯座</option>
<option>金牛座</option>
<option>雙子座</option>
<option>雙魚座</option>
<option>牡羊座</option>
<option>獅子座</option>
<option>水瓶座</option>
<option>天秤座</option>
<option>金牛座</option>
<option>處女座</option>
<option>射手座</option>
<option>巨蟹座</option>

</select>



<label>
備註

</label>


<textarea class="form-control mb-3">

溫柔、會照顧人

</textarea>



<button class="btn btn-primary w-100">

儲存修改

</button>


<a href="boyfriend-list.html"
class="btn btn-secondary w-100 mt-2">

返回列表

</a>



</div>


</body>

</html>
