<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<title>新增男友</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{

background:#fff0f5;

}

.box{

width:500px;

margin:80px auto;

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 30px #ddd;

}

</style>


</head>


<body>


<div class="box">


<h2 class="text-center text-danger">
❤️ 新增男友
</h2>


<div class="mb-3">

<label class="form-label">
姓名
</label>

<input class="form-control"
placeholder="輸入姓名">

</div>



<div class="mb-3">

<label>
年齡
</label>

<input type="number"
class="form-control">

</div>

<div class="mb-3">

<label>
評分
</label>

<input type="number"
class="form-control"
min="0"
max="5"
step="1">

</div>

<div class="mb-3">

<label>
星座
</label>


<select class="form-select">

<option>摩羯座</option>
<option>金牛座</option>
<option>雙子座</option>
<option>雙魚座</option>
<option>牡羊座</option>
<option>獅子座</option>
<option>水瓶座</option>
<option>天秤座</option>
<option>金牛座</option>
<option>處女座</option>
<option>射手座</option>
<option>巨蟹座</option>

</select>

</div>



<div class="mb-3">

<label>
備註
</label>

<textarea class="form-control">

</textarea>


</div>



<button class="btn btn-danger w-100">

新增完成

</button>


<a href="boyfriend-list.html"
class="btn btn-secondary w-100 mt-2">

返回列表

</a>



</div>


</body>

</html>
