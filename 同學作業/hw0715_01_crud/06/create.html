<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <title>上架新商品</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; }
    </style>
</head>

<body>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="./index.html" class="text-decoration-none">商品管理</a></li>
                        <li class="breadcrumb-item active" aria-current="page">商品上架</li>
                    </ol>
                </nav>

                <div class="card border-0 shadow-lg rounded-3">
                    <div class="card-header bg-dark text-white p-4 border-0 rounded-top-3">
                        <h4 class="m-0 fw-bold text-warning"><i class="bi bi-box-seam me-2"></i>上架新商品</h4>
                        <small class="text-white-50">填寫下方商品規格與初始庫存量以完成上架</small>
                    </div>
                    <div class="card-body p-4">
                        <form action="./store.html" class="needs-validation" novalidate>
                            
                            <div class="mb-3">
                                <label for="productName" class="form-label fw-bold">商品名稱 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="productName" placeholder="請輸入完整的商品規格名稱" name="name" required>
                                <div class="invalid-feedback">請輸入商品名稱。</div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label for="price" class="form-label fw-bold">單價 (TWD) <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text">$</span>
                                        <input type="number" class="form-control" id="price" min="1" placeholder="請輸入售價" name="price" required>
                                        <div class="invalid-feedback">價格必須大於 0。</div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="stock" class="form-label fw-bold">初始庫存量 <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" id="stock" min="0" placeholder="輸入初始數量" name="stock" required>
                                        <span class="input-group-text">件</span>
                                        <div class="invalid-feedback">庫存量不可小於 0。</div>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-2 justify-content-end border-top pt-3">
                                <a href="./index.html" class="btn btn-light px-4">取消</a>
                                <button type="submit" class="btn btn-warning px-4 fw-bold"><i class="bi bi-plus-circle-fill me-1"></i>確認上架</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>

</html>
