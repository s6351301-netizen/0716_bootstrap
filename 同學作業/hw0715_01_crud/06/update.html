<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品更新成功</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f9ff; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 text-center">
                <div class="card border-0 shadow-lg p-5 rounded-4">
                    <div class="mb-4">
                        <span class="badge bg-info-subtle text-info p-4 rounded-circle fs-1">
                            <i class="bi bi-cloud-arrow-up-fill"></i>
                        </span>
                    </div>
                    <h3 class="fw-bold text-info mb-2">商品更新成功！</h3>
                    <p class="text-secondary mb-4">edit to update ok. 商品規格與庫存數據已成功同步更新。</p>
                    
                    <div class="p-3 bg-light rounded-3 mb-4 text-secondary-50 small">
                        系統將在 <span id="countdown" class="fw-bold text-info">3</span> 秒後自動返回管理首頁...
                    </div>
                    
                    <a href="./index.html" class="btn btn-info text-white px-4 py-2 w-100"><i class="bi bi-house-fill me-1"></i>立即返回</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let count = 3;
        const countdownEl = document.getElementById('countdown');
        const interval = setInterval(() => {
            count--;
            countdownEl.textContent = count;
            if (count === 0) {
                clearInterval(interval);
                window.location.href = './index.html';
            }
        }, 1000);
    </script>
</body>

</html>
