<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <title>電商後台 - 商品庫存管理</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: 800; letter-spacing: 0.5px; }
        .product-img { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand text-warning" href="javascript:void(0)">
                <i class="bi bi-box-seam-fill me-2"></i>ShopAdmin
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="./index.html">商品管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="javascript:void(0)">訂單管理</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <div class="input-group">
                        <input class="form-control" type="search" placeholder="搜尋商品名稱或條碼..." aria-label="Search">
                        <button class="btn btn-warning" type="button"><i class="bi bi-search"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-1">
                        <li class="breadcrumb-item"><a href="#" class="text-decoration-none">後台首頁</a></li>
                        <li class="breadcrumb-item active" aria-current="page">商品庫存管理</li>
                    </ol>
                </nav>
                <h2 class="fw-bold m-0 text-dark">商品庫存清單</h2>
            </div>
            <div>
                <a href="./create.html" class="btn btn-warning shadow-sm px-4 fw-bold">
                    <i class="bi bi-plus-lg me-2"></i>上架新商品
                </a>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-3 rounded-3">
                    <div class="d-flex align-items-center">
                        <div class="badge bg-primary-subtle text-primary p-3 rounded-3 me-3 fs-4">
                            <i class="bi bi-grid-fill"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-1">在售商品總數</h6>
                            <h3 class="fw-bold mb-0">3 款</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-3 rounded-3">
                    <div class="d-flex align-items-center">
                        <div class="badge bg-danger-subtle text-danger p-3 rounded-3 me-3 fs-4">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                        </div>
                        <div>
                            <h6 class="text-muted mb-1">庫存吃緊商品</h6>
                            <h3 class="fw-bold mb-0">1 款</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="text-center py-3" width="10%">商品編號</th>
                                <th class="py-3" width="35%">商品資訊</th>
                                <th class="text-center py-3" width="15%">售價 (TWD)</th>
                                <th class="text-center py-3" width="15%">當前庫存</th>
                                <th class="text-end py-3 px-4" width="25%">管理操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="text-center fw-semibold text-secondary">#P1001</td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img src="https://placehold.co/100x100/eaeaea/666666?text=Laptop" class="product-img me-3" alt="商品照">
                                        <div>
                                            <span class="fw-bold d-block">極速輕薄筆記型電腦</span>
                                            <small class="text-muted">分類: 3C 電子</small>
                                        </div>
                                    </div>
                                </td>
                                <td class="text-center fw-semibold text-primary">$ 28,900</td>
                                <td class="text-center">
                                    <span class="badge bg-success-subtle text-success px-2.5 py-1.5 rounded-pill">12 件 (充足)</span>
                                </td>
                                <td class="text-end px-4">
                                    <a href="./edit.html?id=1" class="btn btn-outline-secondary btn-sm me-2">
                                        <i class="bi bi-pencil-square me-1"></i>修改
                                    </a>
                                    <a href="./del.html?id=1" class="btn btn-outline-danger btn-sm">
                                        <i class="bi bi-trash3 me-1"></i>下架
                                    </a>
                                </td>
                            </tr>
                            <tr>
                                <td class="text-center fw-semibold text-secondary">#P1002</td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img src="https://placehold.co/100x100/eaeaea/666666?text=Headphone" class="product-img me-3" alt="商品照">
                                        <div>
                                            <span class="fw-bold d-block">主動降噪藍牙耳機</span>
                                            <small class="text-muted">分類: 影音周邊</small>
                                        </div>
                                    </div>
                                </td>
                                <td class="text-center fw-semibold text-primary">$ 5,200</td>
                                <td class="text-center">
                                    <span class="badge bg-danger-subtle text-danger px-2.5 py-1.5 rounded-pill">2 件 (吃緊!)</span>
                                </td>
                                <td class="text-end px-4">
                                    <a href="./edit.html?id=2" class="btn btn-outline-secondary btn-sm me-2">
                                        <i class="bi bi-pencil-square me-1"></i>修改
                                    </a>
                                    <a href="./del.html?id=2" class="btn btn-outline-danger btn-sm">
                                        <i class="bi bi-trash3 me-1"></i>下架
                                    </a>
                                </td>
                                
                            </tr>
                            <tr>
                                <td class="text-center fw-semibold text-secondary">#P1003</td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img src="https://placehold.co/100x100/eaeaea/666666?text=Headphone" class="product-img me-3" alt="商品照">
                                        <div>
                                            <span class="fw-bold d-block">氣泡機</span>
                                            <small class="text-muted">分類: 生活周邊</small>
                                        </div>
                                    </div>
                                </td>
                                <td class="text-center fw-semibold text-primary">$ 8,800</td>
                                <td class="text-center">
                                    <span class="badge bg-danger-subtle text-danger px-2.5 py-1.5 rounded-pill">6 件 (吃緊!)</span>
                                </td>
                                <td class="text-end px-4">
                                    <a href="./edit.html?id=2" class="btn btn-outline-secondary btn-sm me-2">
                                        <i class="bi bi-pencil-square me-1"></i>修改
                                    </a>
                                    <a href="./del.html?id=2" class="btn btn-outline-danger btn-sm">
                                        <i class="bi bi-trash3 me-1"></i>下架
                                    </a>
                                </td>
                                
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
