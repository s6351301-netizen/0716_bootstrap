<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <title>修改商品規格</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; }
    </style>
</head>

<body>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="./index.html" class="text-decoration-none">商品管理</a></li>
                        <li class="breadcrumb-item active" aria-current="page">修改商品</li>
                    </ol>
                </nav>

                <div class="card border-0 shadow-lg rounded-3">
                    <div class="card-header bg-secondary text-white p-4 border-0 rounded-top-3">
                        <h4 class="m-0 fw-bold"><i class="bi bi-pencil-square me-2"></i>編輯商品資訊</h4>
                        <small class="text-white-50">正在修改商品 ID: P1001 的規格數據</small>
                    </div>
                    <div class="card-body p-4">
                        <form action="./update.html" class="needs-validation" novalidate>
                            
                            <div class="mb-3">
                                <label for="productName" class="form-label fw-bold">商品名稱 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="productName" name="name" value="極速輕薄筆記型電腦" required>
                                <div class="invalid-feedback">商品名稱不能為空。</div>
                            </div>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label for="price" class="form-label fw-bold">單價 (TWD) <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text">$</span>
                                        <input type="number" class="form-control" id="price" min="1" name="price" value="28900" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="stock" class="form-label fw-bold">目前庫存量 <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" id="stock" min="0" name="stock" value="12" required>
                                        <span class="input-group-text">件</span>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-2 justify-content-end border-top pt-3">
                                <a href="./index.html" class="btn btn-light px-4">取消變更</a>
                                <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save-fill me-1"></i>儲存變更</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>

</html>
