<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 後臺管理新增範例</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">
    <div class="container py-5">
        <a href="./index.html" class="btn btn-outline-secondary mb-4">← 返回前頁</a>

        <div class="text-center mb-4">
            <p class="text-uppercase text-primary fw-bold mb-2">新增學生</p>
            <h1 class="display-6 fw-bold">建立新資料</h1>
            <p class="lead text-muted">請填入學生基本資訊，完成新增流程。</p>
        </div>

        <div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 720px;">
            <form action="./store.html">
                <div class="mb-3">
                    <label class="form-label">學生 ID</label>
                    <input type="text" class="form-control" name="id" placeholder="input id">
                </div>
                <div class="mb-3">
                    <label class="form-label">學生姓名</label>
                    <input type="text" class="form-control" name="name" placeholder="input name">
                </div>
                <div class="d-flex gap-2">
                    <input type="submit" class="btn btn-primary" value="新增">
                    <a href="./index.html" class="btn btn-outline-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
