<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>請假申請書 - Request for Leave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <style>
        /* 1:1 複製 Login 最完美的深紫背景 */
        body {
            background: url('img.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            /* 消除瀏覽器預設的白邊 */
        }

        /* 1:1 複製 Login 的半透明磨砂玻璃卡片 */
        .form-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(225, 190, 231, 0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            max-width: 650px;
            margin: 0 auto;
            padding: 40px;
        }

        /* 靈魂同步：所有文字與標籤一律改為舒服的薰衣草粉紫 */
        .sync-purple-text {
            color: #E1BEE7 !important;
        }

        /* 輕微透明的粉紫說明文字 */
        .form-text {
            color: #E1BEE7;
            font-size: 0.8rem;
            margin-top: 4px;
            opacity: 0.75;
        }

        /* 輸入框微調：維持白底填寫清晰度，但加上粉紫邊框 */
        .form-control,
        .form-select {
            background-color: rgba(255, 255, 255, 0.9) !important;
            border: 1px solid #E1BEE7 !important;
            padding: 10px 14px;
            border-radius: 8px;
            transition: all 0.2s ease-in-out;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #ffffff !important;
            border-color: #B39DDB !important;
            box-shadow: 0 0 0 0.25rem rgba(225, 190, 231, 0.4) !important;
        }

        /* 分組裝飾線改為半透明粉紫 */
        .section-title {
            color: #E1BEE7;
            font-weight: 700;
            font-size: 1.2rem;
            border-bottom: 2px solid rgba(225, 190, 231, 0.3);
            padding-bottom: 8px;
            margin-top: 35px;
            margin-bottom: 25px;
        }

        /* Radio 單選框同步化 */
        .form-check-input {
            border-color: #E1BEE7 !important;
            background-color: transparent;
        }

        .form-check-input:checked {
            background-color: #9C27B0 !important;
            border-color: #E1BEE7 !important;
        }

        .form-check-input:focus {
            box-shadow: 0 0 0 0.25rem rgba(225, 190, 231, 0.4) !important;
        }

        /* 1:1 複製 Login 的完美同步空心按鈕 */
        .btn-submit-sync {
            background-color: transparent !important;
            border: 2px solid #E1BEE7 !important;
            color: #E1BEE7 !important;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            transition: all 0.25s ease-in-out;
        }

        .btn-submit-sync:hover {
            background-color: #E1BEE7 !important;
            color: #4A148C !important;
            border-color: #E1BEE7 !important;
        }

        /* ==========================================
           🔮 Flatpickr 日曆卡片深紫/粉紫魔改
           ========================================== */
        .flatpickr-calendar {
            background: #4A148C !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5) !important;
            border: 1px solid #E1BEE7 !important;
        }

        .flatpickr-months .flatpickr-month,
        .flatpickr-current-month .flatpickr-monthDropdown-months,
        span.flatpickr-weekday,
        .flatpickr-day {
            color: #E1BEE7 !important;
        }

        .flatpickr-day:hover,
        .flatpickr-day.today:hover {
            background: #B39DDB !important;
            color: #4A148C !important;
        }

        .flatpickr-day.today {
            border-color: #E1BEE7 !important;
        }

        .flatpickr-day.selected {
            background: #9C27B0 !important;
            border-color: #9C27B0 !important;
            color: white !important;
        }

        .flatpickr-prev-month svg,
        .flatpickr-next-month svg {
            fill: #E1BEE7 !important;
        }

        /* ==========================================
           ⏰ 強化版時間選擇選項 (更大、更明顯)
           ========================================== */
        .flatpickr-time input,
        .flatpickr-time .flatpickr-am-pm,
        .flatpickr-time .flatpickr-time-separator {
            color: #ffffff !important;
            /* 純白大字，極度清晰 */
            font-size: 1.4rem !important;
            /* 字體再度放大 */
            font-weight: 700 !important;
            /* 字體加粗 */
        }

        .flatpickr-time input:hover,
        .flatpickr-time input:focus,
        .flatpickr-time .flatpickr-am-pm:hover {
            background: rgba(225, 190, 231, 0.2) !important;
        }

        /* 讓上下調整按鈕放大、變亮紫 */
        .flatpickr-time .numInputWrapper span.arrowUp::after {
            border-bottom-color: #E1BEE7 !important;
            border-width: 0 6px 6px 6px !important;
        }

        .flatpickr-time .numInputWrapper span.arrowDown::after {
            border-top-color: #E1BEE7 !important;
            border-width: 6px 6px 0 6px !important;
        }

        .flatpickr-time .numInputWrapper span {
            width: 22px !important;
        }

        .flatpickr-calendar.hasTime .flatpickr-time {
            border-top: 1px solid rgba(225, 190, 231, 0.3) !important;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="form-container">
            <h2 class="fw-bold mb-1 sync-purple-text" style="letter-spacing: 2px;">請假申請書</h2>
            <p class="mb-4 form-text" style="font-size: 0.9rem;">請在下方填寫您的請假詳細資訊。</p>

            <form>
                <div class="row mb-3 align-items-start">
                    <label class="col-sm-3 fw-bold pt-2 sync-purple-text"><i class='bx bx-user me-1'></i>姓名</label>
                    <div class="col-sm-9">
                        <div class="row">
                            <div class="col">
                                <input type="text" class="form-control">
                                <div class="form-text">名字</div>
                            </div>
                            <div class="col">
                                <input type="text" class="form-control">
                                <div class="form-text">姓氏</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mb-3 align-items-start">
                    <label class="col-sm-3 fw-bold pt-2 sync-purple-text"><i class='bx bx-id-card me-1'></i>員工編號</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" placeholder="例：12345678">
                        <div class="form-text">8 位數員工編號</div>
                    </div>
                </div>

                <div class="row mb-3 align-items-start">
                    <label class="col-sm-3 fw-bold pt-2 sync-purple-text"><i
                            class='bx bx-envelope me-1'></i>電子郵件</label>
                    <div class="col-sm-9">
                        <input type="email" class="form-control" placeholder="example@example.com">
                    </div>
                </div>

                <div class="row mb-3 align-items-start">
                    <label class="col-sm-3 fw-bold pt-2 sync-purple-text"><i class='bx bx-phone me-1'></i>電話號碼</label>
                    <div class="col-sm-9">
                        <div class="row">
                            <div class="col-4">
                                <input type="text" class="form-control">
                                <div class="form-text">區碼</div>
                            </div>
                            <div class="col-8">
                                <input type="text" class="form-control">
                                <div class="form-text">電話號碼</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mb-3 align-items-start">
                    <label class="col-sm-3 fw-bold pt-2 sync-purple-text"><i
                            class='bx bx-mobile-alt me-1'></i>手機號碼</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" placeholder="例：0912345678">
                    </div>
                </div>

                <div class="row mb-3 align-items-start">
                    <label class="col-sm-3 fw-bold pt-2 sync-purple-text"><i class='bx bx-briefcase me-1'></i>職位</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control">
                    </div>
                </div>

                <div class="section-title"><i class='bx bx-info-circle me-1'></i>請假詳細資訊</div>

                <div class="row mb-3 align-items-center">
                    <label class="col-sm-3 fw-bold sync-purple-text">請假單位</label>
                    <div class="col-sm-9">
                        <div class="form-check form-check-inline me-4">
                            <input class="form-check-input" type="radio" name="leaveUnit" id="unitDays" checked>
                            <label class="form-check-label sync-purple-text" for="unitDays">天</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="leaveUnit" id="unitHours">
                            <label class="form-check-label sync-purple-text" for="unitHours">小時</label>
                        </div>
                    </div>
                </div>

                <div class="row mb-3 align-items-start">
                    <label class="col-sm-3 fw-bold pt-2 sync-purple-text"><i
                            class='bx bx-calendar-start me-1'></i>請假開始</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control datetime-picker" value="2026-07-09 09:00">
                    </div>
                </div>

                <div class="row mb-3 align-items-start">
                    <label class="col-sm-3 fw-bold pt-2 sync-purple-text"><i
                            class='bx bx-calendar-end me-1'></i>請假結束</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control datetime-picker" value="2026-07-09 18:00">
                    </div>
                </div>

                <div class="row mb-3 align-items-start">
                    <label class="col-sm-3 fw-bold pt-1 sync-purple-text">假別</label>
                    <div class="col-sm-9">
                        <div class="row">
                            <div class="col-6 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="leaveType" id="typeAnnual"
                                        checked>
                                    <label class="form-check-label sync-purple-text" for="typeAnnual">特休（年假）</label>
                                </div>
                            </div>
                            <div class="col-6 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="leaveType" id="typePersonal">
                                    <label class="form-check-label sync-purple-text" for="typePersonal">事假</label>
                                </div>
                            </div>
                            <div class="col-6 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="leaveType" id="typeSick">
                                    <label class="form-check-label sync-purple-text" for="typeSick">病假</label>
                                </div>
                            </div>
                            <div class="col-6 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="leaveType" id="typeOfficial">
                                    <label class="form-check-label sync-purple-text" for="typeOfficial">公假</label>
                                </div>
                            </div>
                            <div class="col-6 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="leaveType"
                                        id="typeMarriageBereavement">
                                    <label class="form-check-label sync-purple-text" for="typeMarriageBereavement">婚假 /
                                        喪假</label>
                                </div>
                            </div>
                            <div class="col-6 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="leaveType" id="typeOther">
                                    <label class="form-check-label sync-purple-text" for="typeOther">其他</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mb-4 align-items-start">
                    <label class="col-sm-3 fw-bold pt-2 sync-purple-text text-nowrap d-flex align-items-center">
                        <i class='bx bx-comment-detail me-1'></i>備註 / 意見
                    </label>
                    <div class="col-sm-9">
                        <textarea class="form-control" rows="4" placeholder="請填寫詳細事由說明..."></textarea>
                    </div>
                </div>

                <div class="text-center pt-2">
                    <button type="submit" class="btn btn-submit-sync w-100 fw-bold shadow-sm">送 出 申 請</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        // 初始化自訂紫色日曆
        flatpickr(".datetime-picker", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            time_24hr: true
        });
    </script>
</body>

</html>
