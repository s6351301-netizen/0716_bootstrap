    <style>
        :root {
            --academic-blue: #0A3D62;
            --tech-accent: #0984E3;
            --bg-gradient: radial-gradient(circle at 10% 20%, rgba(9, 132, 227, 0.05) 0%, transparent 20%), radial-gradient(circle at 90% 80%, rgba(10, 61, 98, 0.05) 0%, transparent 20%);
        }

        body {

            background-image: var(--bg-gradient);
            min-height: 100vh;
            background-attachment: fixed;
        }

        .card {
            border: none;

            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .card-header {
            background: linear-gradient(135deg, var(--academic-blue), var(--tech-accent));
            color: white;

        }

        .form-label {
            font-weight: 500;
            color: #495057;
        }

        .form-control,

            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--tech-accent);
            box-shadow: 0 0 0 0.25rem rgba(9, 132, 227, 0.25);
        }

        .btn-primary {
            background-color: var(--tech-accent);
            border: none;
            border-radius: 8px;
            padding: 0.6rem 2rem;
            font-weight: bold;
        }

            border-left: 4px solid var(--tech-accent);
            background-color: #f8f9fa;
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 0 8px 8px 0;
        }

        .section-title {
            color: var(--academic-blue);
            border-bottom: 2px solid var(--tech-accent);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }
    </style>
    <script>
        $(document).ready(function () {
            populateDateSelects();
            var loggedInSsn = sessionStorage.getItem('ssn');
            if (loggedInSsn) {
                $('#display_ssn').text(loggedInSsn);
                loadXmlData(loggedInSsn);
            }
        });

        function populateDateSelects() {
            // Generate Year Options (40 to 115)
            var yearHtml = '<option value="">年</option>';
            for (var y = 40; y <= 115; y++) yearHtml += '<option value="' + y + '">' + y + '</option>';

            // Generate Month Options (1 to 12)
            var monthHtml = '<option value="">月</option>';
            for (var m = 1; m <= 12; m++) monthHtml += '<option value="' + m + '">' + m + '</option>';

            // Generate Day Options (1 to 31)
            var dayHtml = '<option value="">日</option>';
            for (var d = 1; d <= 31; d++) dayHtml += '<option value="' + d + '">' + d + '</option>';

            // Inject into all selects based on their name suffix
            $('select').each(function () {
                var name = $(this).attr('name');
                if (name) {
                    if (name.endsWith('y')) $(this).html(yearHtml);
                    if (name.endsWith('m')) $(this).html(monthHtml);
                    if (name.endsWith('d')) $(this).html(dayHtml);
                }
            });
        }

        function loadXmlData(ssn) {
            var xmlUrl = ssn + ".xml";
            var baseUrl = window.location.protocol === 'file:' ? 'http://localhost:8080/' : '';

            fetch(baseUrl + xmlUrl)
                .then(function (response) {
                    if (response.ok) {
                        return response.text();
                    } else {
                        var lowerUrl = ssn.toLowerCase() + ".xml";
                        return fetch(baseUrl + lowerUrl).then(function (res2) {
                            if (res2.ok) return res2.text();
                            throw new Error("找不到對應的 XML 檔案");
                        });
                    }
                })
                .then(function (str) {
                    var xmlDoc = (new window.DOMParser()).parseFromString(str, "text/xml");
                    parseXmlAndFillForm(xmlDoc);
                })
                .catch(function (err) {
                    console.log("未找到資料表檔案或因 CORS 無法讀取: ", err);
                });
        }

        function parseXmlAndFillForm(xmlDoc) {
            var dataNode = xmlDoc.getElementsByTagName("data")[0];
            if (!dataNode) return;
            for (var i = 0; i < dataNode.children.length; i++) {
                var node = dataNode.children[i];
                var tagName = node.tagName;
                var textContent = node.textContent;
                var $input = $('input[name="' + tagName + '"]');
                if ($input.length > 0) {
                    $input.val(textContent);
                } else {
                    var $select = $('select[name="' + tagName + '"]');
                    if ($select.length > 0) {
                        $select.val(textContent);
                    }
                }
            }
        }

        function saveForm() {
            var ssn = sessionStorage.getItem('ssn');
            if (!ssn) { alert('無法取得身分證字號！'); return; }

            var by = $('select[name="fby"]').val() || '00';
            var bm = $('select[name="fbm"]').val() || '00';
            var bd = $('select[name="fbd"]').val() || '00';
            var password = ssn + by.padStart(2, '0') + bm.padStart(2, '0') + bd.padStart(2, '0');

            var newUserXml = '    <user>\\n        <ssn>' + ssn + '</ssn>\\n        <password>' + password + '</password>\\n    </user>\\n';
            var baseUrl = window.location.protocol === 'file:' ? 'http://localhost:8080/' : '';

            fetch(baseUrl + 'login.xml')
                .then(r => r.text())
                .then(xmlStr => {
                    if (xmlStr.indexOf('<ssn>' + ssn + '</ssn>') !== -1) {
                        alert('該帳號已經存在 login.xml 中，無需重複新增！\\n您的預設密碼為：' + password + "\n 如果您忘記密碼,請聯絡管理人員 0971711278。");
                        return;
                    }
                    var updatedXml = xmlStr.replace('</users>', newUserXml + '</users>');
                    fetch('http://localhost:8080/api/save_login', {
                        method: 'POST', body: updatedXml, headers: { 'Content-Type': 'text/plain' }
                    })
                        .then(response => {
                            if (response.ok) alert('🎉 儲存成功！系統已自動更新 login.xml。\\n您的預設密碼為：' + password);
                            else alert('儲存失敗，請確認伺服器有在執行。');
                        })
                        .catch(err => { alert('儲存失敗，無法連線到本機伺服器。'); console.error(err); });
                })
                .catch(err => { alert('儲存失敗，無法讀取 login.xml。'); console.error(err); });
        }
    </script>
