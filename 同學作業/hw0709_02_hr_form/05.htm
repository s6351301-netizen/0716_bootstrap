<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



<script>


const form=document.querySelector("#form");

const fields=form.querySelectorAll(
"input,select,textarea"
);


function update(){


let done=0;


fields.forEach(x=>{


if(x.value || x.checked)

done++;


});



let p=Math.round(

done / fields.length * 100

);



document.querySelector("#progressBar")
.style.width=p+"%";


document.querySelector("#percent")
.innerHTML=p+"%";


}



fields.forEach(x=>{


x.addEventListener(
"input",
update
);


x.addEventListener(
"change",
update
);



});



form.addEventListener(
"submit",
e=>{


e.preventDefault();


if(!form.checkValidity()){


form.classList.add(
"was-validated"
);


return;

}


alert(
"🚀 FUNNY TECH 已收到你的宇宙履歷！"
);


});


</script>
