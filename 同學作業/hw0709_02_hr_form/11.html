<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人力資源表單</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 60px 20px;
        }

        .outer-container {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: white;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        body.dark-mode {
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%);
        }

        body.dark-mode .card {
            background-color: rgba(33, 37, 41, 0.95) !important;
            color: #f8f9fa;
        }

        body.dark-mode .form-control,
        body.dark-mode .form-select {
            background-color: #2c3034;
            color: #f8f9fa;
            border-color: #4b5260;
        }

        body.dark-mode .form-control:focus,
        body.dark-mode .form-select:focus {
            background-color: #2c3034;
            color: #f8f9fa;
            border-color: #7a84a0;
            box-shadow: 0 0 0 0.2rem rgba(122, 132, 160, 0.25);
        }
    </style>
</head>

<body>

    <div class="outer-container">
        <div class="container">
            <div class="card shadow-lg bg-white bg-opacity-90 border-0">
                <div class="card-body p-4 p-md-5">
                    <h1 class="card-title text-center mb-3">員工求職申請表</h1>
                    <p class="text-center text-secondary mb-4">請填寫以下完整資料，以利人資快速安排面試與資料審核。</p>

                    <div class="form-check form-switch text-start mb-4">
                        <input class="form-check-input" type="checkbox" id="darkModeSwitch">
                        <label class="form-check-label" for="darkModeSwitch">深色模式</label>
                    </div>

                    <form action="">
                        <div class="row g-3">
                            <div class="col-12 text-start">
                                <label for="fullName" class="form-label">姓名</label>
                                <input type="text" class="form-control" id="fullName" name="fullName" placeholder="請填寫中文姓名" required>
                            </div>

                            <div class="col-md-6 text-start">
                                <label for="idNumber" class="form-label">身分證字號</label>
                                <input type="text" class="form-control" id="idNumber" name="idNumber" placeholder="A123456789" required>
                            </div>

                            <div class="col-md-6 text-start">
                                <label for="birthday" class="form-label">生日</label>
                                <input type="date" class="form-control" id="birthday" name="birthday" required>
                            </div>

                            <div class="col-md-6 text-start">
                                <label for="phone" class="form-label">連絡電話</label>
                                <input type="tel" class="form-control" id="phone" name="phone" placeholder="0912-345-678" required>
                            </div>

                            <div class="col-md-6 text-start">
                                <label for="email" class="form-label">電子信箱</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="example@mail.com" required>
                            </div>

                            <div class="col-12 text-start">
                                <label for="address" class="form-label">通訊地址</label>
                                <input type="text" class="form-control" id="address" name="address" placeholder="縣市 + 鄉鎮市區 + 路名門牌" required>
                            </div>

                            <div class="col-md-6 text-start">
                                <label for="position" class="form-label">應徵職務</label>
                                <input type="text" class="form-control" id="position" name="position" placeholder="例如：行政助理 / 業務人員" required>
                            </div>

                            <div class="col-md-6 text-start">
                                <label for="startDate" class="form-label">可到職日期</label>
                                <input type="date" class="form-control" id="startDate" name="startDate" required>
                            </div>

                            <div class="col-md-6 text-start">
                                <label for="education" class="form-label">最高學歷</label>
                                <select class="form-select" id="education" name="education" required>
                                    <option selected disabled>請選擇最高學歷</option>
                                    <option value="高中職">高中職</option>
                                    <option value="專科">專科</option>
                                    <option value="大學">大學</option>
                                    <option value="碩士">碩士</option>
                                    <option value="博士">博士</option>
                                </select>
                            </div>

                            <div class="col-md-6 text-start">
                                <label for="genderSelect" class="form-label">性別</label>
                                <select class="form-select" id="genderSelect" name="gender">
                                    <option selected disabled>請選擇性別</option>
                                    <option value="male">男</option>
                                    <option value="female">女</option>
                                    <option value="other">不公開</option>
                                </select>
                            </div>

                            <div class="col-12 text-start">
                                <label for="salaryRange" class="form-label d-flex justify-content-between align-items-center">
                                    <span>期望月薪</span>
                                    <span id="salaryLabel" class="badge bg-primary text-white">45,000</span>
                                </label>
                                <input type="range" class="form-range" id="salaryRange" name="salaryRange" min="25000" max="100000" step="5000" value="45000">
                            </div>

                            <div class="col-12 text-start">
                                <label for="experience" class="form-label">工作經歷 / 其他專長</label>
                                <textarea class="form-control" id="experience" name="experience" rows="4" placeholder="請簡要說明最近工作內容、服務經驗或專長技能"></textarea>
                            </div>

                            <div class="col-12 text-start">
                                <label for="skills" class="form-label">職能與語文能力</label>
                                <input type="text" class="form-control" id="skills" name="skills" placeholder="例如：Excel、Word、英語、日語等">
                            </div>

                            <div class="col-md-6 text-start">
                                <label for="photo" class="form-label">上傳個人照片</label>
                                <input class="form-control" type="file" id="photo" name="photo" accept="image/*">
                            </div>

                            <div class="col-md-6 text-start">
                                <label for="resume" class="form-label">附加履歷檔案</label>
                                <input class="form-control" type="file" id="resume" name="resume" accept="application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
                            </div>

                            <div class="col-12 text-start">
                                <label for="comment" class="form-label">自我介紹 / 備註</label>
                                <textarea class="form-control" id="comment" name="comment" rows="4" placeholder="請簡要介紹自己與應徵動機"></textarea>
                            </div>

                            <div class="col-12">
                                <div class="form-check text-start">
                                    <input class="form-check-input" type="checkbox" id="agree" required>
                                    <label class="form-check-label" for="agree">我已閱讀並同意資料送出後供公司審核。</label>
                                </div>
                            </div>

                            <div class="col-12 d-flex justify-content-center gap-3 mt-3">
                                <button type="reset" class="btn btn-outline-primary px-4">重置</button>
                                <button type="submit" class="btn btn-primary px-4">送出申請</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const salaryRange = document.getElementById('salaryRange');
        const salaryLabel = document.getElementById('salaryLabel');
        if (salaryRange && salaryLabel) {
            const formatSalary = (value) => new Intl.NumberFormat('zh-TW').format(value);
            salaryLabel.textContent = `${formatSalary(salaryRange.value)}`;
            salaryRange.addEventListener('input', () => {
                salaryLabel.textContent = `${formatSalary(salaryRange.value)}`;
            });
        }

        const darkModeSwitch = document.getElementById('darkModeSwitch');
        const card = document.querySelector('.card');
        if (darkModeSwitch && card) {
            darkModeSwitch.addEventListener('change', (event) => {
                if (event.target.checked) {
                    card.classList.remove('bg-white', 'bg-opacity-90');
                    card.classList.add('bg-dark', 'text-white');
                    document.body.classList.add('dark-mode');
                } else {
                    card.classList.add('bg-white', 'bg-opacity-90');
                    card.classList.remove('bg-dark');
                    card.classList.remove('text-white');
                    document.body.classList.remove('dark-mode');
                }
            });
        }
    </script>
</body>

</html>
