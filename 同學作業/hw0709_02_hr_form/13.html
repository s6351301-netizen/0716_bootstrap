            position: relative;

        /* 漂浮鏡片 */

        body::before {
            content: "";

            position: fixed;

            width: 350px;
            height: 350px;

            border-radius: 50%;

            left: -120px;
            top: 80px;

            background:
                rgba(255, 255, 255, .15);

            backdrop-filter: blur(10px);

            border:
                2px solid rgba(255, 255, 255, .35);

            animation:
                floatLens 15s infinite ease-in-out;

            z-index: -1;
        }

        body::after {
            content: "";

            position: fixed;

            width: 280px;
            height: 280px;

            border-radius: 50%;

            right: -80px;
            top: 180px;

            background:
                rgba(255, 255, 255, .12);

            backdrop-filter: blur(10px);

            border:
                2px solid rgba(255, 255, 255, .3);

            animation:
                floatLens 18s infinite ease-in-out;

            z-index: -1;
        }

        @keyframes floatLens {

            0% {
                transform:
                    translateY(0px) rotate(0deg);
            }

            50% {
                transform:
                    translateY(-30px) rotate(8deg);
            }

            100% {
                transform:
                    translateY(0px) rotate(0deg);
            }
        }

        /* 主容器 */

        .container {

            color: #8A3B2A;

            font-weight: bold;
        }

        /* 卡片 */

            border-radius: 25px;

            overflow: hidden;

            box-shadow:

        .card-header {

            background:

                    #D0735A);

            color: white;

            font-weight: bold;

            border: none;
        }

        /* Label */

        label {

            font-weight: 600;

            color: #5b463d;
        }

        /* Input */

        .form-control,

            border-radius: 15px;

            border:

            padding: 12px;
        }

        .form-control:focus,

            border-color: #B5523C;

        .btn-success {

                <script>
                    function handlePhoneTypeChange() {
                        const phoneType = document.getElementById('phoneType').value;
                        const phoneInput = document.getElementById('phoneInput');

                        // 清空使用者已經輸入的內容，避免格式錯亂
                        phoneInput.value = '';

                        if (phoneType === 'mobile') {
                            // 切換為手機格式
                            phoneInput.placeholder = '請輸入手機號碼（例：0912345678）';
                            phoneInput.maxLength = 10;
                            phoneInput.pattern = '09[0-9]{8}';
                            phoneInput.title = '電話格式錯誤！必須為 09 開頭的 10 位純數字';
                        } else {
                            // 切換為市話格式 (台灣市話包含區碼，總長度約為 9 到 10 碼，例如 0223456789 或 042345678)
                            phoneInput.placeholder = '請包含區碼，勿填符號（例：0223456789）';
                            phoneInput.maxLength = 10;
                            phoneInput.pattern = '0[2-8][0-9]{7,8}';
                            phoneInput.title = '市話格式錯誤！請包含區碼（如02），且總長度應為 9 或 10 位純數字';

                    <script>
                        // 核心：處理 YES / NO 調查區塊雙向切換與背景資料抹除
                        function togglePrescriptionLogic() {
                            const yesRadio = document.getElementById('prescYes');
                            const detailsSection = document.getElementById('prescriptionDetails');
                            const noReasonSection = document.getElementById('noPrescriptionReason');

                            // 抓取區塊內所有輸入控制項以利切換時自動清空
                            const yesInputs = detailsSection.querySelectorAll('input');
                            const noInputs = noReasonSection.querySelectorAll('input');

                            if (yesRadio.checked) {
                                // 選 YES：顯示 YES 區塊、隱藏 NO 區塊
                                detailsSection.classList.remove('d-none');
                                noReasonSection.classList.add('d-none');

                                // 抹除並隱藏 NO 區塊內先前填寫的暫存資料
                                noInputs.forEach(input => {
                                    if (input.type === 'checkbox') input.checked = false;
                                    if (input.type === 'text') { input.value = ''; input.classList.add('d-none'); }
                                });
                            } else {
                                // 選 NO：隱藏 YES 區塊、顯示 NO 區塊
                                detailsSection.classList.add('d-none');
                                noReasonSection.classList.remove('d-none');

                                // 抹除並隱藏 YES 區塊內先前填寫的暫存資料
                                yesInputs.forEach(input => {
                                    if (input.type === 'checkbox') input.checked = false;
                                    if (input.type === 'text') { input.value = ''; input.classList.add('d-none'); }
                                });
                            }
                        }

                        // 控制 YES 區塊的「其他原因」文字輸入框顯隱
                        function toggleYesOtherInput() {
                            const yesReasonOther = document.getElementById('yesReasonOther');
                            const yesOtherReasonText = document.getElementById('yesOtherReasonText');
                            if (yesReasonOther.checked) {
                                yesOtherReasonText.classList.remove('d-none');
                            } else {
                                yesOtherReasonText.classList.add('d-none');
                                yesOtherReasonText.value = '';
                            }
                        }

                        // 控制 NO 區塊的「其他原因」文字輸入框顯隱
                        function toggleNoOtherInput() {
                            const reasonOther = document.getElementById('reasonOther');
                            const noOtherReasonText = document.getElementById('noOtherReasonText');
                            if (reasonOther.checked) {
                                noOtherReasonText.classList.remove('d-none');
                            } else {
                                noOtherReasonText.classList.add('d-none');
                                noOtherReasonText.value = '';
                            }
                        }

                        // 網頁全部載入完成時，立刻跑一次初始化，確保初始畫面結構正常
                        document.addEventListener("DOMContentLoaded", function () {
                            togglePrescriptionLogic();
                        });
                    </script>
